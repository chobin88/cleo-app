5. "move" — move a task from one subcategory to another (use catId/subId for the DESTINATION)

Return ONLY valid JSON, no markdown, no backticks:
{"action":"create|update|done|delete|move","catId":"category id","subId":"subcategory id","taskId":null_or_existing_id,"text":"task title (clean it up from Joe's messy input)","priority":"high|medium|low","deadline":"","notes":"any structured notes","status":"todo|inprog|pending|done","message":"short confirmation message to show Joe (be friendly, 1 sentence)"}

RULES:
- Pick the RIGHT category and subcategory automatically based on context
- If Joe mentions groceries, kids, workout, personal stuff → Personal
- If Joe mentions rent, license, legal, landlord, hydro, city of vancouver → ARCannabis
- If Joe mentions stock, inventory, PPC, listings, returns → Amazon Seller
- If Joe mentions paper pals, stickers → Paper Pals
- Clean up Joe's messy text into a clear task title
- Set priority based on urgency cues (deadline, money, legal = high)
- If it matches an existing task, update it instead of creating a duplicate
- Keep message short and confident`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,system:sysPrompt,messages:[{role:"user",content:raw}]})});
      const d=await r.json();
      const txt=d.content?.find(b=>b.type==="text")?.text||"{}";
      const result=JSON.parse(txt.replace(/```json|```/g,"").trim());
      const now=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

      if(result.action==="create"){
        const cat=cats.find(c=>c.id===result.catId)||cats.find(c=>c.id===currentTab)||cats[0];
        const sub=cat.subs.find(s=>s.id===result.subId)||cat.subs[0];
        snap("➕ CLEO: "+(result.text||"New task").slice(0,25));
        setCats(prev=>prev.map(c=>c.id!==cat.id?c:{...c,subs:c.subs.map(s=>s.id!==sub.id?s:{...s,items:[...s.items,{id:uid(),text:result.text||raw,done:false,priority:result.priority||"medium",loc:"",notes:result.notes||"",deadline:result.deadline||"",isEmail:false,status:result.status||"todo",files:[],requiredFiles:[],log:[`${now} — Task created via CLEO`]}]})}));
        setMainTab(cat.id);setSubTabs(t=>({...t,[cat.id]:sub.id}));
      } else if(result.action==="update"&&result.taskId){
        snap("✏️ CLEO update: "+result.taskId);
        setCats(prev=>prev.map(c=>({...c,subs:c.subs.map(s=>({...s,items:s.items.map(i=>{
          if(i.id!==result.taskId)return i;
          const upd={...i};
          if(result.text)upd.text=result.text;
          if(result.priority)upd.priority=result.priority;
          if(result.status)upd.status=result.status;
          if(result.deadline)upd.deadline=result.deadline;
          if(result.notes)upd.notes=result.notes;
          upd.log=[...(upd.log||[]),`${now} — Updated via CLEO`];
          return upd;
        })}))})));
      } else if(result.action==="done"&&result.taskId){
        snap("✅ CLEO done: "+result.taskId);
        setCats(prev=>prev.map(c=>({...c,subs:c.subs.map(s=>({...s,items:s.items.map(i=>i.id!==result.taskId?i:{...i,done:true,status:"done",log:[...(i.log||[]),`${now} — Marked done via CLEO`]})}))})));
      } else if(result.action==="delete"&&result.taskId){
        snap("🗑️ CLEO delete: "+result.taskId);
        setCats(prev=>prev.map(c=>({...c,subs:c.subs.map(s=>({...s,items:s.items.filter(i=>i.id!==result.taskId)}))})));
      } else if(result.action==="move"&&result.taskId){
        snap("📦 CLEO move: "+result.taskId);
        let movedTask=null;
        setCats(prev=>{
          // First find and remove the task from its current location
          const after=prev.map(c=>({...c,subs:c.subs.map(s=>{
            const found=s.items.find(i=>i.id===result.taskId);
            if(found)movedTask={...found,log:[...(found.log||[]),`${now} — Moved via CLEO`]};
            return {...s,items:s.items.filter(i=>i.id!==result.taskId)};
          })}));
          if(!movedTask)return after;
          // Then add it to the destination
          const destCat=result.catId||currentTab;
          const destSub=result.subId;
          return after.map(c=>c.id!==destCat?c:{...c,subs:c.subs.map(s=>s.id!==destSub?s:{...s,items:[...s.items,movedTask]})});
        });
        if(result.catId)setMainTab(result.catId);
        if(result.subId)setSubTabs(t=>({...t,[result.catId]:result.subId}));
      }
      showToast(result.message||"Done ✓");
    }catch(e){
      console.error("CLEO error:",e);
      // Fallback: just add as task to current tab
      const cat=cats.find(c=>c.id===currentTab)||cats[0];
      const sub=cat.subs.find(s=>s.id===currentSubTab)||cat.subs[0];
      const now=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
      snap("➕ Quick add: "+raw.slice(0,25));
      setCats(prev=>prev.map(c=>c.id!==cat.id?c:{...c,subs:c.subs.map(s=>s.id!==sub.id?s:{...s,items:[...s.items,{id:uid(),text:raw,done:false,priority:"medium",loc:"",notes:"",deadline:"",isEmail:false,status:"todo",files:[],requiredFiles:[],log:[`${now} — Task created`]}]})}));
      setMainTab(cat.id);setSubTabs(t=>({...t,[cat.id]:sub.id}));
      showToast(`Added to ${cat.label} ✓`);
    }
    setLoading(false);
  }

  async function generate(){
    if(!brainDump.trim()&&!brainTitle.trim()){showToast("Describe the situation first");return;}
    setBrainLoading(true);setBrainResult(null);setEditingVersion(null);
    const isEmail=brainType==="email";
    try{
      const emailSchema = '{"taskTitle":"short task title","priority":"high or medium or low","actions":["action 1","action 2","action 3"],"emailSubject":"email subject line","sender":"sender full name","senderEmail":"sender email address","dateReceived":"Month Day e.g. Apr 10","v1":"Version 1 — Balanced tone. 3-5 short paragraphs. Full sign-off.","v2":"Version 2 — Shorter. 2-3 sentences per paragraph. Full sign-off."}';
      const taskSchema = '{"taskTitle":"short task title","priority":"high or medium or low","actions":["action 1","action 2","action 3"],"summary":"2-3 sentence summary","nextStep":"single most important next action"}';
      const sysPrompt = "You are CLEO, Joe Le's personal assistant. Joe is Co-Founder of ARCannabis Store, Vancouver BC. Also runs Paper Pals and Amazon Seller. All business is in BC Canada. Ministry of Finance = BC Ministry of Finance. PST = BC Provincial Sales Tax. Never suggest phone calls unless Joe asks. Never use informal or slang language. Always sign off: Joe Le, Co-Founder ARCannabis Store, (778) 858-9591, joe@arcannabis.ca. JOE'S TONE: Plain English, honest, warm but professional, transparent, no fluff, in between formal and casual. TASK NOTES STRUCTURE — always format task notes exactly like this:\nCONTACT\n[Name, role, phone, email]\n\nSITUATION\n[What is happening, why it matters, any deadlines or fines]\n\nSTATUS\n[Current state — what has been done, what is pending]\n\nNEXT STEPS\n[Numbered list of exactly what Joe needs to do, in order]\n\nIF NO REPLY\n[Escalation plan — who to call, who to CC, when to act] Example: \"" + JOE_TONE + "\"" + (brainExtra ? " Additional context: " + brainExtra : "") + ". Task type: " + brainType + ". Return ONLY valid JSON, no markdown, no backticks: " + (isEmail ? emailSchema : taskSchema);
      const qaKey=lsGet(LS_KEY,"");
      if(!qaKey){const k=window.prompt("Enter your Anthropic API key for CLEO.\nconsole.anthropic.com/settings/keys");if(k&&k.trim())lsSet(LS_KEY,k.trim());else{setBrainLoading(false);return;}}
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":lsGet(LS_KEY,""),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,
          system:sysPrompt,
          messages:[{role:"user",content:`Title: ${brainTitle||"(no title)"}\n\nSituation: ${brainDump}`}]})});
      const d=await r.json();
      const raw=d.content?.find(b=>b.type==="text")?.text||"{}";
      setBrainResult(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    }catch(e){showToast("Error — try again");}
    setBrainLoading(false);
  }

  function saveTask(chosenContent){
    if(!brainResult)return;
    const cat=cats.find(c=>c.id===brainCat)||cats[0];
    const sub=cat.subs[0];
    const isEmail=brainType==="email";
    const notes=isEmail
      ?`EMAIL DRAFT\n\nSubject: ${brainResult.emailSubject}\n\n${chosenContent}\n\nACTION ITEMS:\n${(brainResult.actions||[]).map((a,i)=>`${i+1}. ${a}`).join("\n")}`
      :`TASK SUMMARY\n\n${brainResult.summary||""}\n\nNEXT STEP: ${brainResult.nextStep||""}\n\nACTION ITEMS:\n${(brainResult.actions||[]).map((a,i)=>`${i+1}. ${a}`).join("\n")}`;
    snap("🤖 AI Task: "+(brainResult.taskTitle||brainTitle||"New task").slice(0,25));
    setCats(prev=>prev.map(c=>c.id!==cat.id?c:{...c,subs:c.subs.map(s=>s.id!==sub.id?s:{...s,items:[...s.items,{
      id:uid(),text:brainResult.taskTitle||brainTitle||"New task",
      done:false,priority:brainResult.priority||"high",loc:"",
      notes,deadline:"",isEmail:false,status:"todo",
      log:[`${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})} — Task created via CLEO brain dump`]
    }]})}));
    setMainTab(cat.id);setSubTabs(t=>({...t,[cat.id]:sub.id}));
    setShowBrain(false);setBrainDump("");setBrainTitle("");setBrainResult(null);setBrainExtra("");
    showToast("Task saved ✓");
  }

  if(showBrain) return (
    <div style={{position:"absolute",inset:0,background:"#eee9e0",zIndex:200,display:"flex",flexDirection:"column"}}>
      <div style={{background:"#ffffff",flex:1,display:"flex",flexDirection:"column",overflowY:"auto",padding:"14px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>{setShowBrain(false);setBrainResult(null);setBrainExtra("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#777066",lineHeight:1,padding:0}}>←</button>
          <div style={{fontWeight:700,fontSize:15,color:"#111122"}}>✍️ New Task</div>
        </div>
        <button onClick={()=>{setShowBrain(false);setBrainResult(null);setBrainExtra("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:24,color:"#999088",lineHeight:1}}>×</button>
      </div>
      <input value={brainTitle} onChange={e=>setBrainTitle(e.target.value)}
        placeholder="Task title"
        style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:10,padding:"10px 12px",color:"#111122",fontSize:13,outline:"none",marginBottom:10,fontWeight:600}}/>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:"#999088",marginBottom:4,letterSpacing:"0.06em"}}>TYPE</div>
          <select value={brainType} onChange={e=>{setBrainType(e.target.value);setBrainResult(null);}}
            style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:9,padding:"9px",color:"#111122",fontSize:13,outline:"none"}}>
            {TASK_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:"#999088",marginBottom:4,letterSpacing:"0.06em"}}>CATEGORY</div>
          <select value={brainCat} onChange={e=>setBrainCat(e.target.value)}
            style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:9,padding:"9px",color:"#111122",fontSize:13,outline:"none"}}>
            {cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
          </select>
        </div>
      </div>
      <div style={{fontSize:10,color:"#999088",marginBottom:4,letterSpacing:"0.06em"}}>SITUATION — TELL ME WHAT'S GOING ON</div>
      <textarea value={brainDump} onChange={e=>setBrainDump(e.target.value)}
        placeholder="Just talk — tell me the situation in your own words. The more detail the better. I'll handle the rest."
        style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:10,padding:"10px 12px",color:"#111122",fontSize:13,outline:"none",resize:"vertical",minHeight:90,maxHeight:300,lineHeight:1.65,fontFamily:"inherit",marginBottom:10}}/>
      <button onClick={generate} disabled={brainLoading}
        style={{width:"100%",background:brainLoading?"#ccc5b8":"#111122",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:13,padding:"11px",cursor:brainLoading?"not-allowed":"pointer",marginBottom:brainResult?12:0}}>
        {brainLoading?"🤖 CLEO is writing...":"🤖 Generate"}
      </button>
      {brainResult&&<div>
        <div style={{fontSize:10,color:"#999088",letterSpacing:"0.07em",marginBottom:8,marginTop:4}}>
          {brainType==="email"?`📧 ${brainResult.emailSubject}`:"📋 TASK BREAKDOWN"}
        </div>
        {brainType==="email"?<>
          {["v1","v2"].map((vk,vi)=>(
            <div key={vk} style={{background:"#fff",border:"1px solid #ddd8cf",borderRadius:11,padding:"11px 13px",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:10,fontWeight:700,color:vi===0?"#d50000":"#665e52",letterSpacing:"0.05em"}}>
                  {vi===0?"VERSION 1 — BALANCED (JOE'S TONE)":"VERSION 2 — SHORTER"}
                </div>
                <button onClick={()=>{setEditingVersion(editingVersion===vk?null:vk);setEditText(brainResult[vk]||"");}}
                  style={{background:"none",border:"1px solid #ccccdd",borderRadius:6,color:"#999088",fontSize:10,padding:"2px 8px",cursor:"pointer"}}>
                  {editingVersion===vk?"Done":"Edit"}
                </button>
              </div>
              {editingVersion===vk
                ?<textarea value={editText} onChange={e=>setEditText(e.target.value)}
                    style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:8,padding:"9px",color:"#111122",fontSize:12,outline:"none",resize:"none",minHeight:120,lineHeight:1.65,fontFamily:"inherit",marginBottom:8}}/>
                :<div style={{fontSize:12,color:"#333344",lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:150,overflowY:"auto",marginBottom:8}}>{brainResult[vk]}</div>
              }
              <button onClick={()=>saveTask(editingVersion===vk?editText:brainResult[vk])}
                style={{width:"100%",background:vi===0?"#d50000":"#665e52",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,padding:"8px",cursor:"pointer"}}>
                ✓ Use This — Save Task
              </button>
            </div>
          ))}
          <div style={{background:"#fffbf0",border:"1px solid #ffe0a0",borderRadius:11,padding:"11px 13px",marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:"#aa7700",marginBottom:6,letterSpacing:"0.05em"}}>💬 WANT CHANGES? TELL ME</div>
            <textarea value={brainExtra} onChange={e=>setBrainExtra(e.target.value)}
              placeholder="e.g. Make it shorter, or Add that it's a BC Ministry of Finance issue, or More apologetic tone"
              style={{width:"100%",background:"#fff",border:"1px solid #ffe0a0",borderRadius:8,padding:"8px 10px",color:"#111122",fontSize:12,outline:"none",resize:"none",minHeight:60,lineHeight:1.6,fontFamily:"inherit",marginBottom:8}}/>
            <button onClick={generate} disabled={brainLoading}
              style={{width:"100%",background:brainLoading?"#ccc5b8":"#aa7700",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,padding:"8px",cursor:brainLoading?"not-allowed":"pointer"}}>
              {brainLoading?"Regenerating...":"🔄 Regenerate with Changes"}
            </button>
          </div>
        </>:<>
          <div style={{background:"#fff",border:"1px solid #ddd8cf",borderRadius:11,padding:"11px 13px",marginBottom:10}}>
            {brainResult.summary&&<div style={{fontSize:12,color:"#333344",lineHeight:1.7,marginBottom:10}}>{brainResult.summary}</div>}
            {brainResult.nextStep&&<div style={{background:"#fff8f0",border:"1px solid #ffcc8030",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#884400",marginBottom:10}}>
              <strong>Next step:</strong> {brainResult.nextStep}
            </div>}
            {brainResult.actions&&<div>
              <div style={{fontSize:10,color:"#999088",letterSpacing:"0.07em",marginBottom:6}}>ACTION ITEMS</div>
              {brainResult.actions.map((a,i)=><div key={i} style={{display:"flex",gap:7,fontSize:12,color:"#333344",padding:"2px 0"}}>
                <span style={{color:"#d50000",fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{a}</span>
              </div>)}
            </div>}
            <button onClick={()=>saveTask("")}
              style={{width:"100%",marginTop:12,background:"#111122",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,padding:"9px",cursor:"pointer"}}>
              ✓ Save Task
            </button>
          </div>
        </>}
        {brainType==="email"&&brainResult.actions&&<div style={{borderTop:"1px solid #ddd8cf",paddingTop:10,marginBottom:4}}>
          <div style={{fontSize:10,color:"#999088",letterSpacing:"0.07em",marginBottom:6}}>ACTION ITEMS</div>
          {brainResult.actions.map((a,i)=><div key={i} style={{display:"flex",gap:7,fontSize:12,color:"#333344",padding:"2px 0"}}>
            <span style={{color:"#d50000",fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{a}</span>
          </div>)}
        </div>}
      </div>}
    </div>
    </div>
  );

  return (
    <div style={{position:"absolute",bottom:10,left:14,right:14,background:"#ffffff",border:"1px solid #ddd8cf",borderRadius:20,padding:"6px 8px",display:"flex",alignItems:"center",gap:6,zIndex:50,boxShadow:"0 2px 16px #00000015"}}>
      <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#8b5cf6,#d946ef)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>🤖</div>
      <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} disabled={loading}
        placeholder={loading?"CLEO is thinking...":"Tell CLEO anything..."}
        style={{flex:1,minWidth:0,background:"transparent",border:"none",padding:"8px 4px",color:"#111122",fontSize:13,outline:"none"}}/>
      <button onClick={go} disabled={loading||!val.trim()}
        style={{width:36,height:36,borderRadius:12,background:loading?"#ccc5b8":val.trim()?"linear-gradient(135deg,#8b5cf6,#d946ef)":"#e8e4dc",border:"none",color:"#fff",fontWeight:900,fontSize:16,cursor:loading||!val.trim()?"default":"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.2s"}}>
        {loading?"···":"↑"}
      </button>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
