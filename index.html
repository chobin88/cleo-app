                    style={{flex:1,background:"#111122",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:13,padding:"12px",cursor:"pointer"}}>
                    📋 Copy Email
                  </button>
                  <button onClick={()=>{
                    const updated={...item.drafts,chosen:null};
                    onChooseDraft(cat.id,sub.id,item.id,updated);
                    setFocusedDraft(null);setFeedbackHistory([]);
                  }}
                    style={{flex:1,background:"none",border:"2px solid #ccccdd",borderRadius:10,color:"#777066",fontWeight:700,fontSize:13,padding:"12px",cursor:"pointer"}}>
                    ↩ Edit Again
                  </button>
                </div>
                <div style={{background:"#e8fff5",border:"1px solid #2effa830",borderRadius:10,padding:"10px 12px",marginTop:8,textAlign:"center",fontSize:11,color:"#0a5a3a",lineHeight:1.5}}>
                  Copy and send from Outlook. Then tell CLEO "I sent it" and I'll update the status.
                </div>
              </div>
            )}
          </div>}

          {/* STATUS SELECTOR */}
          <div>
            <div style={{fontSize:9,color:"#999088",letterSpacing:"0.08em",marginBottom:6}}>STATUS</div>
            <div style={{display:"flex",gap:4}}>
              {Object.entries(STATUS).map(([k,v])=>(
                <button key={k} onClick={()=>{
                  if((item.status||"todo")!==k){
                    onAddLog(cat.id,sub.id,item.id,`${v.icon} Status → ${v.label}`);
                  }
                  onSetStatus(cat.id,sub.id,item.id,k);
                }}
                  style={{flex:1,padding:"6px 0",borderRadius:20,border:`2px solid ${(item.status||"todo")===k?v.border||v.color+"60":"#00000012"}`,background:(item.status||"todo")===k?v.bg:"#f5f1ea",color:(item.status||"todo")===k?v.color:"#b5ac9e",fontSize:9,fontWeight:700,cursor:"pointer",transition:"all 0.2s",boxShadow:(item.status||"todo")===k?`0 2px 8px ${v.color}20`:"none",textAlign:"center",whiteSpace:"nowrap"}}>
                  {v.icon} {v.label}
                </button>
              ))}
            </div>
          </div>
          {/* CHAT WITH CLEO */}
          <div style={{background:"#f5f1ea",border:"1px solid #ddd8cf",borderRadius:12,padding:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:9,color:"#999088",letterSpacing:"0.08em"}}>💬 CHAT WITH CLEO</div>
              {chatLoading&&<div style={{fontSize:9,color:"#aa7700",fontWeight:600}}>⏳ thinking...</div>}
            </div>
            <div style={{maxHeight:220,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
              {(item.chat||[]).map((msg,mi)=>(
                <div key={"tc"+mi} style={{
                  alignSelf:msg.from==="joe"?"flex-end":"flex-start",
                  maxWidth:"85%",
                  background:msg.from==="joe"?"#111122":"#fffbf0",
                  color:msg.from==="joe"?"#fff":"#333344",
                  border:msg.from==="joe"?"none":"1px solid #ffe0a0",
                  borderRadius:msg.from==="joe"?"12px 12px 4px 12px":"12px 12px 12px 4px",
                  padding:"8px 11px",fontSize:12,lineHeight:1.5,whiteSpace:"pre-wrap"
                }}>
                  {msg.from!=="joe"&&<div style={{fontSize:9,fontWeight:700,color:"#aa7700",marginBottom:3}}>CLEO</div>}
                  {msg.previews&&msg.previews.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
                    {msg.previews.map((src,pi)=><img key={pi} src={src} alt="screenshot" style={{width:"100%",maxWidth:200,borderRadius:8,border:"1px solid #ffffff30"}}/>)}
                  </div>}
                  {msg.text}
                </div>
              ))}
              {chatLoading&&(
                <div style={{alignSelf:"flex-start",maxWidth:"85%",background:"#fffbf0",border:"1px solid #ffe0a0",borderRadius:"12px 12px 12px 4px",padding:"8px 11px",fontSize:12}}>
                  <div style={{fontSize:9,fontWeight:700,color:"#aa7700",marginBottom:3}}>CLEO</div>
                  <span style={{color:"#aa7700"}}>typing...</span>
                </div>
              )}
              {(item.chat||[]).length===0&&!chatLoading&&(
                <div style={{color:"#b5ac9e",fontSize:11,fontStyle:"italic",textAlign:"center",padding:"6px 0"}}>Tell CLEO what to do with this task...</div>
              )}
              <div ref={chatEndRef}/>
            </div>
            {chatFiles.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:6}}>
              {chatFiles.map((f,fi)=>(
                <div key={fi} style={{position:"relative",background:"#eef6ff",border:"1px solid #4faaff30",borderRadius:10,overflow:"hidden",display:"flex",flexDirection:"column",alignItems:"center"}}>
                  {f.preview
                    ?<img src={f.preview} alt={f.name} style={{width:80,height:60,objectFit:"cover",borderRadius:"10px 10px 0 0"}}/>
                    :null}
                  <div style={{display:"flex",alignItems:"center",gap:3,padding:"3px 8px",fontSize:9,color:"#1a6fcc"}}>
                    <span>{f.preview?"📷":"📎"} {f.name.length>15?f.name.slice(0,12)+"…":f.name}</span>
                  </div>
                  <button onClick={()=>setChatFiles(prev=>prev.filter((_,i)=>i!==fi))} style={{position:"absolute",top:2,right:2,background:"#00000060",border:"none",cursor:"pointer",color:"#fff",fontSize:10,borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",padding:0,lineHeight:1}}>×</button>
                </div>
              ))}
            </div>}
            <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
              <input ref={chatFileRef} type="file" multiple style={{display:"none"}} onChange={e=>{
                const files=Array.from(e.target.files||[]);
                if(files.length>0) setChatFiles(prev=>[...prev,...files.map(f=>({name:f.name,size:f.size}))]);
                e.target.value="";
              }}/>
              <textarea value={taskChat} onChange={e=>setTaskChat(e.target.value)}
                placeholder={"e.g. set deadline for Friday, paste a screenshot, update notes..."}
                onPaste={handlePaste}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChatMsg();}}}
                style={{flex:1,background:"#fff",border:"1px solid #ddd8cf",borderRadius:10,padding:"9px 11px",fontSize:12,color:"#333344",lineHeight:1.4,resize:"none",minHeight:38,maxHeight:80,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
              <button onClick={()=>chatFileRef.current?.click()} title="Attach file"
                style={{background:"#f5f1ea",border:"1px solid #ddd8cf",borderRadius:10,color:"#999088",fontSize:16,width:38,height:38,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>📎</button>
              <button onClick={sendChatMsg}
                disabled={!taskChat.trim()||chatLoading}
                style={{background:taskChat.trim()&&!chatLoading?"#111122":"#dddddd",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:18,width:38,height:38,cursor:taskChat.trim()&&!chatLoading?"pointer":"default",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                ↑
              </button>
            </div>
          </div>

          {/* ACTIVITY LOG */}
          {item.log&&item.log.length>0&&<div>
            <div onClick={()=>setLogOpen(!logOpen)} style={{fontSize:9,color:"#999088",letterSpacing:"0.08em",marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:6,userSelect:"none"}}><span style={{display:"inline-block",transition:"transform 0.2s",transform:logOpen?"rotate(90deg)":"rotate(0deg)",fontSize:10}}>▶</span>📋 ACTIVITY LOG <span style={{fontSize:9,color:"#bbb0a4"}}>({item.log.length})</span></div>
            {logOpen&&<div style={{background:"#ece7de",border:"1px solid #00000010",borderRadius:11,padding:"10px 12px",display:"flex",flexDirection:"column",gap:6}}>
              {item.log.map((entry,i)=>(
                <div key={i} style={{display:"flex",gap:8,fontSize:11,lineHeight:1.5}}>
                  <span style={{color:entry.startsWith("⏳")?"#b07800":entry.startsWith("✅")?"#0a7a50":"#444455",flexShrink:0,fontSize:12}}>{entry.startsWith("⏳")?"⏳":entry.startsWith("✅")?"✅":"•"}</span>
                  <span style={{color:entry.startsWith("⏳")?"#7a5500":entry.startsWith("✅")?"#0a5a3a":"#222233"}}>{entry.replace(/^[⏳✅]\s*/,"")}</span>
                </div>
              ))}
            </div>}
          </div>}

          <div style={{display:"flex",gap:8,paddingTop:4}}>
            <button onClick={()=>{onToggle(cat.id,sub.id,item.id);onClose();}} style={{flex:1,padding:11,borderRadius:11,border:`1px solid ${item.done?"#00000018":cat.color+"50"}`,background:item.done?"#0000000a":cat.color+"15",color:item.done?"#777066":cat.color,fontSize:13,fontWeight:700,cursor:"pointer"}}>{item.done?"↩ Mark Incomplete":"✓ Mark Done"}</button>
            <button onClick={()=>{onDelete(cat.id,sub.id,item.id);onClose();}} style={{padding:"11px 14px",borderRadius:11,border:"1px solid #ff445530",background:"#ff445510",color:"#ff4455",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff4455" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function PlanView({cats,setDetail}){
  const today=new Date();
  const dayOfWeek=today.getDay(); /* 0=Sun, 6=Sat */
  const isWeekend=dayOfWeek===0||dayOfWeek===6;
  const dayLabel=today.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  /* Gather all active tasks with their parent info */
  const allTasks=cats.flatMap(c=>c.subs.flatMap(s=>s.items.filter(i=>!i.done).map(i=>({...i,_cat:c,_sub:s,_catIcon:c.icon,_catLabel:c.label,_catColor:c.color}))));

  /* Split work vs personal */
  const workCats=["arc","pp","amz"];
  const workTasks=allTasks.filter(t=>workCats.includes(t._cat.id));
  const personalTasks=allTasks.filter(t=>!workCats.includes(t._cat.id));

  /* Sort: deadline first (soonest), then priority, then status */
  const MONTH_ORD={"Jan":1,"Feb":2,"Mar":3,"Apr":4,"May":5,"Jun":6,"Jul":7,"Aug":8,"Sep":9,"Oct":10,"Nov":11,"Dec":12};
  const deadlineVal=d=>{if(!d)return 999;const p=d.trim().split(" ");return(MONTH_ORD[p[0]]||0)*100+(parseInt(p[1])||0);};
  const priVal={high:0,medium:1,low:2};
  const statusVal={inprog:0,pending:1,todo:2};
  const smartSort=(a,b)=>{
    const da=deadlineVal(a.deadline),db=deadlineVal(b.deadline);
    if(da!==db)return da-db;
    if(priVal[a.priority]!==priVal[b.priority])return priVal[a.priority]-priVal[b.priority];
    return(statusVal[a.status||"todo"]||2)-(statusVal[b.status||"todo"]||2);
  };
  workTasks.sort(smartSort);
  personalTasks.sort(smartSort);

  /* Time block helpers */
  const fmt=m=>{const h=Math.floor(m/60),mn=m%60,ap=h>=12?"PM":"AM",hr=h>12?h-12:h===0?12:h;return `${hr}:${String(mn).padStart(2,"0")} ${ap}`;};

  /* Build 10-2 work blocks (1 hour each) */
  const workBlocks=[
    {label:"10:00 – 11:00",start:600,end:660,icon:"🔥",desc:"Most urgent — deadlines & high priority"},
    {label:"11:00 – 12:00",start:660,end:720,icon:"⚡",desc:"Important tasks — keep momentum"},
    {label:"12:00 – 1:00",start:720,end:780,icon:"📋",desc:"Follow-ups, emails, medium tasks"},
    {label:"1:00 – 2:00",start:780,end:840,icon:"✅",desc:"Quick wins, low priority, wrap up"}
  ];

  /* Distribute work tasks across 4 blocks */
  const perBlock=Math.ceil(workTasks.length/4)||1;
  workBlocks.forEach((b,i)=>{
    b.tasks=workTasks.slice(i*perBlock,(i+1)*perBlock);
  });

  const PRI2={high:{label:"HIGH",bg:"#ff335520",color:"#ff4455",dot:"🔴"},medium:{label:"MED",bg:"#ffcc4420",color:"#cc8800",dot:"🟡"},low:{label:"LOW",bg:"#4faaff20",color:"#4faaff",dot:"🔵"}};

  const openTask=(t)=>{setDetail({item:t,cat:t._cat,sub:t._sub});};

  /* Current time indicator */
  const nowMin=today.getHours()*60+today.getMinutes();
  const currentBlock=workBlocks.findIndex(b=>nowMin>=b.start&&nowMin<b.end);
  const beforeWork=nowMin<600;
  const afterWork=nowMin>=840;

  return (
    <div>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",borderRadius:14,marginBottom:10,padding:"14px 16px",color:"#fff"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800}}>⚡ {isWeekend?"WEEKEND":"TODAY'S GAME PLAN"}</div>
        <div style={{fontSize:11,color:"#ffffff88",marginTop:3}}>{dayLabel}</div>
        {!isWeekend&&<div style={{display:"flex",gap:12,marginTop:10}}>
          <div style={{background:"#ffffff15",borderRadius:8,padding:"6px 10px",fontSize:11}}>
            <span style={{color:"#ff8866",fontWeight:700}}>{workTasks.filter(t=>t.priority==="high").length}</span>
            <span style={{color:"#ffffff88",marginLeft:4}}>urgent</span>
          </div>
          <div style={{background:"#ffffff15",borderRadius:8,padding:"6px 10px",fontSize:11}}>
            <span style={{color:"#66ddff",fontWeight:700}}>{workTasks.length}</span>
            <span style={{color:"#ffffff88",marginLeft:4}}>work tasks</span>
          </div>
          <div style={{background:"#ffffff15",borderRadius:8,padding:"6px 10px",fontSize:11}}>
            <span style={{color:"#88ffaa",fontWeight:700}}>{personalTasks.length}</span>
            <span style={{color:"#ffffff88",marginLeft:4}}>personal</span>
          </div>
        </div>}
      </div>

      {/* Time status bar */}
      {!isWeekend&&<div style={{background:beforeWork?"#fff8ee":afterWork?"#f0fff4":"#eef6ff",border:"1px solid "+(beforeWork?"#ffcc4430":afterWork?"#0a8a5c30":"#4faaff30"),borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:11,color:beforeWork?"#cc8800":afterWork?"#0a7a50":"#1a6fcc",fontWeight:600}}>
        {beforeWork&&`⏰ Work block starts at 10:00 AM — ${Math.floor((600-nowMin)/60)}h ${(600-nowMin)%60}m from now`}
        {currentBlock>=0&&`🟢 You're in Block ${currentBlock+1} — ${workBlocks[currentBlock].label}`}
        {afterWork&&"✅ Work block done! Personal time now."}
        {!beforeWork&&currentBlock<0&&!afterWork&&`⏳ Between blocks — ${fmt(nowMin)}`}
      </div>}

      {/* Weekend — no extra banner needed */}

      {/* WORK BLOCKS — 10am to 2pm (weekdays only) */}
      {!isWeekend&&workBlocks.map((b,bi)=>{
        const isActive=bi===currentBlock;
        const isPast=nowMin>=b.end;
        const isFuture=nowMin<b.start;
        return (
        <div key={bi} style={{background:"#ffffff",border:isActive?"2px solid #1a6fcc":"1px solid #ddd8cf",borderRadius:14,marginBottom:8,overflow:"hidden",opacity:isPast?0.6:1}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:isActive?"#eef6ff":"#f9f7f3"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14}}>{b.icon}</span>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:isActive?"#1a6fcc":"#111122"}}>{b.label}</div>
                <div style={{fontSize:9,color:"#999088"}}>{b.desc}</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              {isActive&&<span style={{background:"#1a6fcc",color:"#fff",fontSize:8,fontWeight:700,padding:"2px 7px",borderRadius:8}}>NOW</span>}
              {isPast&&<span style={{fontSize:9,color:"#999088"}}>done</span>}
              <span style={{fontSize:10,color:"#999088",fontWeight:600}}>{b.tasks.length}</span>
            </div>
          </div>
          {b.tasks.length===0&&<div style={{padding:"12px 14px",fontSize:11,color:"#b5ac9e",textAlign:"center"}}>No tasks in this block</div>}
          {b.tasks.map((t,ti)=>(
            <button key={t.id} onClick={()=>openTask(t)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"9px 14px",borderTop:"1px solid #00000008",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:12}}>{PRI2[t.priority].dot}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:600,color:"#111122",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.text}</div>
                <div style={{fontSize:9,color:"#999088"}}>{t._catIcon} {t._catLabel} · {t.status==="inprog"?"In Progress":t.status==="pending"?"Pending":"To Do"}{t.deadline?" · ⏰ "+t.deadline:""}</div>
              </div>
              <span style={{fontSize:12,color:"#ccc5b8"}}>›</span>
            </button>
          ))}
        </div>
      );})}

      {/* PERSONAL BLOCK — After 2pm */}
      <div style={{background:"#ffffff",border:"1px solid #ddd8cf",borderRadius:14,marginBottom:8,overflow:"hidden",opacity:(!isWeekend&&!afterWork)?0.5:1}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:afterWork||isWeekend?"#f0fff4":"#f9f7f3"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>🏠</span>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:afterWork||isWeekend?"#0a7a50":"#111122"}}>{isWeekend?"All Day":"After 2:00 PM"} — Personal</div>
              <div style={{fontSize:9,color:"#999088"}}>Kids, errands, life stuff</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            {(afterWork||isWeekend)&&<span style={{background:"#0a8a5c",color:"#fff",fontSize:8,fontWeight:700,padding:"2px 7px",borderRadius:8}}>NOW</span>}
            <span style={{fontSize:10,color:"#999088",fontWeight:600}}>{personalTasks.length}</span>
          </div>
        </div>
        {personalTasks.length===0&&<div style={{padding:"12px 14px",fontSize:11,color:"#b5ac9e",textAlign:"center"}}>Nothing personal today 🎉</div>}
        {personalTasks.map(t=>(
          <button key={t.id} onClick={()=>openTask(t)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"9px 14px",borderTop:"1px solid #00000008",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
            <span style={{fontSize:12}}>{PRI2[t.priority].dot}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:"#111122",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.text}</div>
              <div style={{fontSize:9,color:"#999088"}}>{t._catIcon} {t._catLabel}{t.deadline?" · ⏰ "+t.deadline:""}</div>
            </div>
            <span style={{fontSize:12,color:"#ccc5b8"}}>›</span>
          </button>
        ))}
      </div>

      {/* Footer tip */}
      {!isWeekend&&<div style={{background:"#f5f1ea",borderRadius:10,padding:"10px 14px",fontSize:10,color:"#999088",lineHeight:1.7,marginTop:4}}>
        💡 CLEO auto-sorts by deadline → priority → status. Tap any task to open details. Most urgent items always go in the 10–11 block.
      </div>}
    </div>
  );
}

function AIView({cats}){
  const [msgs,setMsgs]=useState([{role:"a",text:`Hey Joe! I can see all your tasks across ARCannabis, Paper Pals, Amazon Seller, and Personal.\n\n⚠️ Most urgent: 1290 E 12th BL deadline Apr 12 — call Kimberly Li if no reply Monday.\n\nWhat do you need?`}]);
  const [inp,setInp]=useState("");
  const [loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const ctx=cats.map(c=>`## ${c.label}\n${c.subs.map(s=>`  ${s.label}: ${s.items.filter(i=>!i.done).length} pending\n${s.items.filter(i=>!i.done).map(i=>`    - [${i.priority}] ${i.text}${i.deadline?" DL:"+i.deadline:""}`).join("\n")}`).join("\n")}`).join("\n\n");
  async function send(text){
    const t=text||inp.trim();if(!t||loading)return;setInp("");
    const key=(lsGet(LS_KEY,"")||DEFAULT_KEY);
    if(!key){
      const k=window.prompt("Enter your Anthropic API key to enable CLEO AI.\nGet one at console.anthropic.com/settings/keys");
      if(!k||!k.trim()) return;
      lsSet(LS_KEY, k.trim());
    }
    const apiKey=(lsGet(LS_KEY,"")||DEFAULT_KEY);
    const newMsgs=[...msgs,{role:"u",text:t}];setMsgs(newMsgs);setLoading(true);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:`You are CLEO, Joe's personal AI assistant. Be concise, warm, mobile-friendly. Use short paragraphs, not bullet lists. Today: ${new Date().toDateString()}.\n\n${ctx}`,messages:newMsgs.map(m=>({role:m.role==="u"?"user":"assistant",content:m.text}))})});
      const d=await r.json();
      if(d.error&&d.error.type==="authentication_error"){lsSet(LS_KEY,"");setMsgs(p=>[...p,{role:"a",text:"API key invalid — send another message and I'll ask for a new key."}]);}
      else{const reply=d.content?.find(b=>b.type==="text")?.text||"Try again.";setMsgs(p=>[...p,{role:"a",text:reply}]);}
    }catch(e){setMsgs(p=>[...p,{role:"a",text:"Connection error — check internet and try again."}]);}
    setLoading(false);
  }
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{background:"#ffffff",border:"1px solid #b060ff25",borderRadius:14,overflow:"hidden"}}>
        <div style={{background:"#f5f0ff",padding:"12px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid #00000010"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#b060ff,#4faaff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🧠</div>
          <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:800,color:"#b060ff"}}>MASTER AI</div><div style={{fontSize:9,color:"#999088"}}>Knows all your tasks</div></div>
          <div style={{marginLeft:"auto",width:7,height:7,borderRadius:"50%",background:"#2effa8",boxShadow:"0 0 6px #2effa8"}}/>
        </div>
        <div style={{maxHeight:"38vh",overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:8}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.role==="u"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"88%",padding:"9px 12px",fontSize:12,lineHeight:1.6,whiteSpace:"pre-wrap",borderRadius:m.role==="u"?"12px 12px 3px 12px":"12px 12px 12px 3px",background:m.role==="u"?"#b060ff":"#f5f0ff",color:m.role==="u"?"#fff":"#222233",border:m.role==="a"?"1px solid #d0c8f0":"none"}}>{m.text}</div>
            </div>
          ))}
          {loading&&<div style={{display:"flex",gap:4,padding:"8px 12px"}}>
            {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#b060ff",animation:`bounce 1s ${i*.15}s infinite`}}/>)}
          </div>}
          <div ref={ref}/>
        </div>
        <div style={{display:"flex",gap:5,padding:"6px 10px",overflowX:"auto",scrollbarWidth:"none"}}>
          {["Game plan 10am-2pm","Most urgent today?","ARCannabis priorities","What can I skip?"].map(q=>(
            <button key={q} onClick={()=>send(q)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,background:"#0000000a",border:"1px solid #00000010",color:"#999088",fontSize:10,cursor:"pointer",whiteSpace:"nowrap"}}>{q}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:7,padding:"10px 12px",borderTop:"1px solid #00000010"}}>
          <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask anything..." style={{flex:1,background:"#0000000a",border:"1px solid #00000015",borderRadius:10,padding:"9px 12px",color:"#111122",fontSize:12,outline:"none"}}/>
          <button onClick={()=>send()} disabled={loading} style={{background:"linear-gradient(135deg,#b060ff,#4faaff)",border:"none",borderRadius:10,color:"#fff",fontWeight:900,fontSize:17,width:42,cursor:loading?"not-allowed":"pointer",opacity:loading?.6:1}}>↑</button>
        </div>
      </div>
      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}`}</style>
    </div>
  );
}


function AlertsView({cats, setMainTab, setDetail}){
  const today = new Date();
  const MONTH_ORDER = {"Jan":1,"Feb":2,"Mar":3,"Apr":4,"May":5,"Jun":6,"Jul":7,"Aug":8,"Sep":9,"Oct":10,"Nov":11,"Dec":12};
  
  function daysUntil(deadline){
    if(!deadline) return 999;
    const p = deadline.trim().split(" ");
    const m = MONTH_ORDER[p[0]]||0;
    const d = parseInt(p[1])||0;
    const target = new Date(today.getFullYear(), m-1, d);
    return Math.ceil((target - today)/(1000*60*60*24));
  }

  const allItems = cats.flatMap(c=>c.subs.flatMap(s=>s.items.map(i=>({...i,catId:c.id,catLabel:c.label,catColor:c.color,subLabel:s.label,subId:s.id}))));
  const pending = allItems.filter(i=>!i.done);

  // Build smart alerts
  const alerts = [];

  // OVERDUE — deadline passed
  pending.filter(i=>i.deadline&&daysUntil(i.deadline)<0).forEach(i=>{
    alerts.push({
      level:"high",
      icon:"🚨",
      title:`OVERDUE — ${i.deadline}`,
      msg:i.text,
      sub:`${i.catLabel} · ${i.subLabel}`,
      color:"#d50000",
      bg:"#fff0f0",
      border:"#ff445540",
      item:i
    });
  });

  // DUE TODAY OR TOMORROW
  pending.filter(i=>i.deadline&&daysUntil(i.deadline)>=0&&daysUntil(i.deadline)<=1).forEach(i=>{
    alerts.push({
      level:"high",
      icon:"⏰",
      title:"DUE " + (daysUntil(i.deadline)===0 ? "TODAY" : "TOMORROW — " + i.deadline),
      msg:i.text,
      sub:`${i.catLabel} · ${i.subLabel}`,
      color:"#cc4400",
      bg:"#fff5f0",
      border:"#ff770040",
      item:i
    });
  });

  // DUE IN 2-3 DAYS
  pending.filter(i=>i.deadline&&daysUntil(i.deadline)>=2&&daysUntil(i.deadline)<=3).forEach(i=>{
    alerts.push({
      level:"medium",
      icon:"📅",
      title:`DUE IN ${daysUntil(i.deadline)} DAYS — ${i.deadline}`,
      msg:i.text,
      sub:`${i.catLabel} · ${i.subLabel}`,
      color:"#aa7700",
      bg:"#fffbf0",
      border:"#ffcc4440",
      item:i
    });
  });

  // MISSING FILES — has requiredFiles but not all attached
  pending.filter(i=>i.requiredFiles?.length>0&&!i.requiredFiles.every(r=>(i.files||[]).find(f=>f.label===r))).forEach(i=>{
    const missing = i.requiredFiles.filter(r=>!(i.files||[]).find(f=>f.label===r));
    alerts.push({
      level:"medium",
      icon:"📎",
      title:"FILES NEEDED BEFORE EMAIL CAN SEND",
      msg:missing.map(m=>"- "+m).join("\n"),

      sub:i.catLabel + " — " + i.text,
      color:"#aa7700",
      bg:"#fffbf0",
      border:"#ffcc4440",
      item:i
    });
  });

  // PENDING STATUS — waiting on someone
  pending.filter(i=>i.status==="pending"&&i.isEmail).forEach(i=>{
    alerts.push({
      level:"medium",
      icon:"⏳",
      title:"WAITING FOR REPLY",
      msg:`${i.sender||"Contact"} has not responded yet`,
      sub:`${i.catLabel} — ${i.text}`,
      color:"#4488cc",
      bg:"#f0f6ff",
      border:"#4faaff40",
      item:i,
      hasFollowUp:true
    });
  });

  // HIGH PRIORITY — no deadline but high priority
  pending.filter(i=>i.priority==="high"&&!i.deadline&&i.status==="todo").forEach(i=>{
    alerts.push({
      level:"medium",
      icon:"🔴",
      title:"HIGH PRIORITY — NOT STARTED",
      msg:i.text,
      sub:`${i.catLabel} · ${i.subLabel}`,
      color:"#cc3344",
      bg:"#fff5f5",
      border:"#ff445530",
      item:i
    });
  });

  const high = alerts.filter(a=>a.level==="high");
  const medium = alerts.filter(a=>a.level==="medium");

  function AlertCard({a}){
    return (
      <div style={{background:a.bg,border:`1px solid ${a.border}`,borderRadius:13,padding:"12px 14px",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
          <span style={{fontSize:18,flexShrink:0}}>{a.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:9,fontWeight:800,color:a.color,letterSpacing:"0.08em",marginBottom:3}}>{a.title}</div>
            <div style={{fontSize:12,fontWeight:600,color:"#111122",lineHeight:1.4,whiteSpace:"pre-line"}}>{a.msg}</div>
            <div style={{fontSize:10,color:"#999088",marginTop:3}}>{a.sub}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10}}>
          <button onClick={()=>setDetail({item:a.item,cat:cats.find(c=>c.id===a.item.catId),sub:cats.find(c=>c.id===a.item.catId)?.subs.find(s=>s.id===a.item.subId)})}
            style={{flex:1,padding:"8px",borderRadius:9,border:`1px solid ${a.border}`,background:"#fff",color:a.color,fontSize:11,fontWeight:700,cursor:"pointer"}}>
            Open Task →
          </button>
          {a.hasFollowUp&&(
            <button onClick={()=>{setMainTab("arc");}}
              style={{flex:1,padding:"8px",borderRadius:9,border:"none",background:a.color,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              ✍️ Draft Follow-Up
            </button>
          )}
        </div>
      </div>
    );
  }

  return (
    <div>
      {alerts.length===0&&(
        <div style={{textAlign:"center",padding:"50px 20px"}}>
          <div style={{fontSize:40,marginBottom:12}}>✅</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:"#111122"}}>All clear, Joe!</div>
          <div style={{fontSize:12,color:"#999088",marginTop:6}}>No urgent alerts right now.</div>
        </div>
      )}

      {high.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:9,fontWeight:800,color:"#d50000",letterSpacing:"0.1em",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <span style={{background:"#d50000",color:"#fff",borderRadius:20,padding:"2px 8px"}}>🚨 URGENT — ACT NOW</span>
          </div>
          {high.map((a,i)=><AlertCard key={i} a={a}/>)}
        </div>
      )}

      {medium.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:9,fontWeight:800,color:"#aa7700",letterSpacing:"0.1em",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <span style={{background:"#ffcc44",color:"#553300",borderRadius:20,padding:"2px 8px"}}>📋 NEEDS ATTENTION</span>
          </div>
          {medium.map((a,i)=><AlertCard key={i} a={a}/>)}
        </div>
      )}
    </div>
  );
}

    {id:"financial",label:"💵 Financial"},
  ];

  const JOE_TONE = "Hi [Name], I wanted to reach out and be transparent about our current situation. [State the issue honestly]. We are actively working to resolve this as quickly as possible. I understand this is not ideal, and I want to be upfront rather than leave you guessing. As soon as we have clarity on next steps, I will update you right away. We appreciate your patience. Thank you, Joe";

  function go(){
    let raw=val.trim();if(!raw)return;setVal("");
    const validCat=cats.find(c=>c.id===currentTab);
    let catId=validCat?currentTab:"per",subId=validCat?currentSubTab:null,text=raw,priority="medium",loc="";
    const ci=raw.indexOf(":");
    if(ci>0){const hint=raw.slice(0,ci).trim().toLowerCase();text=raw.slice(ci+1).trim();const found=cats.find(c=>c.label.toLowerCase().replace(/\s/g,"").includes(hint.replace(/\s/g,""))||c.id.includes(hint));if(found){catId=found.id;subId=found.subs[0]?.id;}}
    if(/!high|urgent/i.test(text)){priority="high";text=text.replace(/!high|urgent/gi,"").trim();}
    if(/!low/i.test(text)){priority="low";text=text.replace(/!low/gi,"").trim();}
    const lm=text.match(/@(\S+)/);if(lm){loc=lm[1];text=text.replace(/@\S+/,"").trim();}
    const cat=cats.find(c=>c.id===catId);if(!cat){showToast("Category not found");return;}
    const sub=subId?cat.subs.find(s=>s.id===subId):cat.subs[0];if(!sub){showToast("Add a subcategory first");return;}
    snap("➕ Quick add: "+(text||"New task").slice(0,25));
    const now=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    setCats(prev=>prev.map(c=>c.id!==catId?c:{...c,subs:c.subs.map(s=>s.id!==sub.id?s:{...s,items:[...s.items,{id:uid(),text:text||"New task",done:false,priority,loc,notes:"New task — tap to add details",deadline:"",isEmail:false,status:"todo",files:[],requiredFiles:[],log:[`${now} — Task created`]}]})}));
    setMainTab(catId);setSubTabs(t=>({...t,[catId]:sub.id}));
    showToast(`Added to ${cat.label} ✓`);
  }

  async function generate(){
    if(!brainDump.trim()&&!brainTitle.trim()){showToast("Describe the situation first");return;}
    setBrainLoading(true);setBrainResult(null);setEditingVersion(null);
    const isEmail=brainType==="email";
    try{
      const emailSchema = '{"taskTitle":"short task title","priority":"high or medium or low","actions":["action 1","action 2","action 3"],"emailSubject":"email subject line","sender":"sender full name","senderEmail":"sender email address","dateReceived":"Month Day e.g. Apr 10","v1":"Version 1 — Balanced tone. 3-5 short paragraphs. Full sign-off.","v2":"Version 2 — Shorter. 2-3 sentences per paragraph. Full sign-off."}';
      const taskSchema = '{"taskTitle":"short task title","priority":"high or medium or low","actions":["action 1","action 2","action 3"],"summary":"2-3 sentence summary","nextStep":"single most important next action"}';
      const sysPrompt = "You are CLEO, Joe Le's personal assistant. Joe is Co-Founder of ARCannabis Store, Vancouver BC. Also runs Paper Pals and Amazon Seller. All business is in BC Canada. Ministry of Finance = BC Ministry of Finance. PST = BC Provincial Sales Tax. Never suggest phone calls unless Joe asks. Never use informal or slang language. Always sign off: Joe Le, Co-Founder ARCannabis Store, (778) 858-9591, joe@arcannabis.ca. JOE'S TONE: Plain English, honest, warm but professional, transparent, no fluff, in between formal and casual. TASK NOTES STRUCTURE — always format task notes exactly like this:\nCONTACT\n[Name, role, phone, email]\n\nSITUATION\n[What is happening, why it matters, any deadlines or fines]\n\nSTATUS\n[Current state — what has been done, what is pending]\n\nNEXT STEPS\n[Numbered list of exactly what Joe needs to do, in order]\n\nIF NO REPLY\n[Escalation plan — who to call, who to CC, when to act] Example: \"" + JOE_TONE + "\"" + (brainExtra ? " Additional context: " + brainExtra : "") + ". Task type: " + brainType + ". Return ONLY valid JSON, no markdown, no backticks: " + (isEmail ? emailSchema : taskSchema);
      const qaKey=(lsGet(LS_KEY,"")||DEFAULT_KEY);
      if(!qaKey){const k=window.prompt("Enter your Anthropic API key for CLEO.\nconsole.anthropic.com/settings/keys");if(k&&k.trim())lsSet(LS_KEY,k.trim());else{setBrainLoading(false);return;}}
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":(lsGet(LS_KEY,"")||DEFAULT_KEY),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,
          system:sysPrompt,
          messages:[{role:"user",content:`Title: ${brainTitle||"(no title)"}\n\nSituation: ${brainDump}`}]})});
      const d=await r.json();
      const raw=d.content?.find(b=>b.type==="text")?.text||"{}";
      setBrainResult(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    }catch(e){showToast("Error — try again");}
    setBrainLoading(false);
  }

  function saveTask(chosenContent){
    if(!brainResult)return;
    const cat=cats.find(c=>c.id===brainCat)||cats[0];
    const sub=cat.subs[0];
    const isEmail=brainType==="email";
    const notes=isEmail
      ?`EMAIL DRAFT\n\nSubject: ${brainResult.emailSubject}\n\n${chosenContent}\n\nACTION ITEMS:\n${(brainResult.actions||[]).map((a,i)=>`${i+1}. ${a}`).join("\n")}`
      :`TASK SUMMARY\n\n${brainResult.summary||""}\n\nNEXT STEP: ${brainResult.nextStep||""}\n\nACTION ITEMS:\n${(brainResult.actions||[]).map((a,i)=>`${i+1}. ${a}`).join("\n")}`;
    snap("🤖 AI Task: "+(brainResult.taskTitle||brainTitle||"New task").slice(0,25));
    setCats(prev=>prev.map(c=>c.id!==cat.id?c:{...c,subs:c.subs.map(s=>s.id!==sub.id?s:{...s,items:[...s.items,{
      id:uid(),text:brainResult.taskTitle||brainTitle||"New task",
      done:false,priority:brainResult.priority||"high",loc:"",
      notes,deadline:"",isEmail:false,status:"todo",
      log:[`${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})} — Task created via CLEO brain dump`]
    }]})}));
    setMainTab(cat.id);setSubTabs(t=>({...t,[cat.id]:sub.id}));
    setShowBrain(false);setBrainDump("");setBrainTitle("");setBrainResult(null);setBrainExtra("");
    showToast("Task saved ✓");
  }

  if(showBrain) return (
    <div style={{position:"absolute",inset:0,background:"#eee9e0",zIndex:200,display:"flex",flexDirection:"column"}}>
      <div style={{background:"#ffffff",flex:1,display:"flex",flexDirection:"column",overflowY:"auto",padding:"14px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>{setShowBrain(false);setBrainResult(null);setBrainExtra("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#777066",lineHeight:1,padding:0}}>←</button>
          <div style={{fontWeight:700,fontSize:15,color:"#111122"}}>✍️ New Task</div>
        </div>
        <button onClick={()=>{setShowBrain(false);setBrainResult(null);setBrainExtra("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:24,color:"#999088",lineHeight:1}}>×</button>
      </div>
      <input value={brainTitle} onChange={e=>setBrainTitle(e.target.value)}
        placeholder="Task title"
        style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:10,padding:"10px 12px",color:"#111122",fontSize:13,outline:"none",marginBottom:10,fontWeight:600}}/>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:"#999088",marginBottom:4,letterSpacing:"0.06em"}}>TYPE</div>
          <select value={brainType} onChange={e=>{setBrainType(e.target.value);setBrainResult(null);}}
            style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:9,padding:"9px",color:"#111122",fontSize:13,outline:"none"}}>
            {TASK_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:"#999088",marginBottom:4,letterSpacing:"0.06em"}}>CATEGORY</div>
          <select value={brainCat} onChange={e=>setBrainCat(e.target.value)}
            style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:9,padding:"9px",color:"#111122",fontSize:13,outline:"none"}}>
            {cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
          </select>
        </div>
      </div>
      <div style={{fontSize:10,color:"#999088",marginBottom:4,letterSpacing:"0.06em"}}>SITUATION — TELL ME WHAT'S GOING ON</div>
      <textarea value={brainDump} onChange={e=>setBrainDump(e.target.value)}
        placeholder="Just talk — tell me the situation in your own words. The more detail the better. I'll handle the rest."
        style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:10,padding:"10px 12px",color:"#111122",fontSize:13,outline:"none",resize:"vertical",minHeight:90,maxHeight:300,lineHeight:1.65,fontFamily:"inherit",marginBottom:10}}/>
      <button onClick={generate} disabled={brainLoading}
        style={{width:"100%",background:brainLoading?"#ccc5b8":"#111122",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:13,padding:"11px",cursor:brainLoading?"not-allowed":"pointer",marginBottom:brainResult?12:0}}>
        {brainLoading?"🤖 CLEO is writing...":"🤖 Generate"}
      </button>
      {brainResult&&<div>
        <div style={{fontSize:10,color:"#999088",letterSpacing:"0.07em",marginBottom:8,marginTop:4}}>
          {brainType==="email"?`📧 ${brainResult.emailSubject}`:"📋 TASK BREAKDOWN"}
        </div>
        {brainType==="email"?<>
          {["v1","v2"].map((vk,vi)=>(
            <div key={vk} style={{background:"#fff",border:"1px solid #ddd8cf",borderRadius:11,padding:"11px 13px",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:10,fontWeight:700,color:vi===0?"#d50000":"#665e52",letterSpacing:"0.05em"}}>
                  {vi===0?"VERSION 1 — BALANCED (JOE'S TONE)":"VERSION 2 — SHORTER"}
                </div>
                <button onClick={()=>{setEditingVersion(editingVersion===vk?null:vk);setEditText(brainResult[vk]||"");}}
                  style={{background:"none",border:"1px solid #ccccdd",borderRadius:6,color:"#999088",fontSize:10,padding:"2px 8px",cursor:"pointer"}}>
                  {editingVersion===vk?"Done":"Edit"}
                </button>
              </div>
              {editingVersion===vk
                ?<textarea value={editText} onChange={e=>setEditText(e.target.value)}
                    style={{width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:8,padding:"9px",color:"#111122",fontSize:12,outline:"none",resize:"none",minHeight:120,lineHeight:1.65,fontFamily:"inherit",marginBottom:8}}/>
                :<div style={{fontSize:12,color:"#333344",lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:150,overflowY:"auto",marginBottom:8}}>{brainResult[vk]}</div>
              }
              <button onClick={()=>saveTask(editingVersion===vk?editText:brainResult[vk])}
                style={{width:"100%",background:vi===0?"#d50000":"#665e52",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,padding:"8px",cursor:"pointer"}}>
                ✓ Use This — Save Task
              </button>
            </div>
          ))}
          <div style={{background:"#fffbf0",border:"1px solid #ffe0a0",borderRadius:11,padding:"11px 13px",marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:"#aa7700",marginBottom:6,letterSpacing:"0.05em"}}>💬 WANT CHANGES? TELL ME</div>
            <textarea value={brainExtra} onChange={e=>setBrainExtra(e.target.value)}
              placeholder="e.g. Make it shorter, or Add that it's a BC Ministry of Finance issue, or More apologetic tone"
              style={{width:"100%",background:"#fff",border:"1px solid #ffe0a0",borderRadius:8,padding:"8px 10px",color:"#111122",fontSize:12,outline:"none",resize:"none",minHeight:60,lineHeight:1.6,fontFamily:"inherit",marginBottom:8}}/>
            <button onClick={generate} disabled={brainLoading}
              style={{width:"100%",background:brainLoading?"#ccc5b8":"#aa7700",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,padding:"8px",cursor:brainLoading?"not-allowed":"pointer"}}>
              {brainLoading?"Regenerating...":"🔄 Regenerate with Changes"}
            </button>
          </div>
        </>:<>
          <div style={{background:"#fff",border:"1px solid #ddd8cf",borderRadius:11,padding:"11px 13px",marginBottom:10}}>
            {brainResult.summary&&<div style={{fontSize:12,color:"#333344",lineHeight:1.7,marginBottom:10}}>{brainResult.summary}</div>}
            {brainResult.nextStep&&<div style={{background:"#fff8f0",border:"1px solid #ffcc8030",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#884400",marginBottom:10}}>
              <strong>Next step:</strong> {brainResult.nextStep}
            </div>}
            {brainResult.actions&&<div>
              <div style={{fontSize:10,color:"#999088",letterSpacing:"0.07em",marginBottom:6}}>ACTION ITEMS</div>
              {brainResult.actions.map((a,i)=><div key={i} style={{display:"flex",gap:7,fontSize:12,color:"#333344",padding:"2px 0"}}>
                <span style={{color:"#d50000",fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{a}</span>
              </div>)}
            </div>}
            <button onClick={()=>saveTask("")}
              style={{width:"100%",marginTop:12,background:"#111122",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:12,padding:"9px",cursor:"pointer"}}>
              ✓ Save Task
            </button>
          </div>
        </>}
        {brainType==="email"&&brainResult.actions&&<div style={{borderTop:"1px solid #ddd8cf",paddingTop:10,marginBottom:4}}>
          <div style={{fontSize:10,color:"#999088",letterSpacing:"0.07em",marginBottom:6}}>ACTION ITEMS</div>
          {brainResult.actions.map((a,i)=><div key={i} style={{display:"flex",gap:7,fontSize:12,color:"#333344",padding:"2px 0"}}>
            <span style={{color:"#d50000",fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{a}</span>
          </div>)}
        </div>}
      </div>}
    </div>
    </div>
  );

  return (
    <div style={{position:"absolute",bottom:10,left:14,right:14,background:"#ffffff",border:"1px solid #ddd8cf",borderRadius:16,padding:"8px 12px",display:"flex",gap:8,zIndex:50,boxShadow:"0 2px 12px #00000012"}}>
      <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Quick add — or tap ✍️ for full task" style={{flex:1,minWidth:0,background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:14,padding:"10px 13px",color:"#111122",fontSize:12,outline:"none"}}/>
      <button onClick={()=>setShowBrain(true)} title="New task with AI"
        style={{background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:14,color:"#665e52",fontSize:16,width:44,cursor:"pointer",flexShrink:0}}>✍️</button>
      <button onClick={go} style={{background:"#d50000",border:"none",borderRadius:14,color:"#fff",fontWeight:900,fontSize:17,padding:"0 16px",cursor:"pointer",flexShrink:0}}>＋</button>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
