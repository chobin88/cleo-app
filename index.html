  _fbWriteId = Date.now();
  const payload = { ...data, _lastWriter: _fbWriteId, _lastModified: Date.now() };
  FB_DOC.set(payload, { merge: true }).catch(e => console.warn("Firebase save:", e));
}

function loadInitialCats(){
  /* Try localStorage first; if unavailable (e.g. artifact preview), use hardcoded data */
  const saved = lsGet(LS_CATS, null);
  if(saved){
    const savedVer = lsGet(LS_VER, 0);
    if(savedVer >= CURRENT_VER) return saved;
  }
  /* First load or version bump — use latest hardcoded data */
  lsSet(LS_VER, CURRENT_VER);
  lsSet(LS_CATS, INITIAL_CATS);
  lsSet(LS_ARCH, []);
  return INITIAL_CATS;
}

function App() {
  const [cats, setCats] = useState(()=>loadInitialCats());
  const [mainTab, setMainTab] = useState("arc");
  const [subTabs, setSubTabs] = useState(()=>lsGet(LS_TABS,{arc:"arc-legal",pp:"pp-ops",amz:"amz-ops",per:"per-tasks"}));
  const [detail, setDetail] = useState(null);
  const [undoStack, setUndoStack] = useState([]);
  const [redoStack, setRedoStack] = useState([]);
  const [actionHistory, setActionHistory] = useState([]);
  const [archived, setArchived] = useState(()=>lsGet(LS_ARCH,[]));
  const [showArchive, setShowArchive] = useState(false);
  const [toast, setToast] = useState("");
  const [addText, setAddText] = useState({});
  const [syncMsg, setSyncMsg] = useState("");
  const [deadlinesOpen, setDeadlinesOpen] = useState(true);
  const [cleoMenuOpen, setCleoMenuOpen] = useState(false);

  /* ── Auto-save to localStorage + Firebase ── */
  const _skipFbRef = useRef(false);
  const _fbTimer = useRef(null);
  useEffect(()=>{
    lsSet(LS_CATS, cats);
    lsSet(LS_NID, _nid);
    if(!_skipFbRef.current){
      clearTimeout(_fbTimer.current);
      _fbTimer.current = setTimeout(()=>{ fbSave({ cats, nid: _nid, ver: CURRENT_VER }); }, 800);
    }
  }, [cats]);
  useEffect(()=>{
    lsSet(LS_ARCH, archived);
    if(!_skipFbRef.current) fbSave({ archived });
  }, [archived]);
  useEffect(()=>{
    lsSet(LS_TABS, subTabs);
    if(!_skipFbRef.current) fbSave({ subTabs });
  }, [subTabs]);
  /* ── Firebase real-time listener + migration ── */
  useEffect(()=>{
    // Count total items to determine richness
    const countItems = (c) => c ? c.reduce((n, cat) => n + cat.subs.reduce((m, s) => m + (s.items ? s.items.length : 0), 0), 0) : 0;
    FB_DOC.get().then(doc => {
      const fbData = doc.exists ? doc.data() : null;
      const fbCats = fbData && fbData.cats ? fbData.cats : null;
      const lsCats = cats;
      const fbCount = countItems(fbCats);
      const lsCount = countItems(lsCats);
      if(!fbCats) {
        fbSave({ cats, archived, subTabs, nid: _nid, ver: CURRENT_VER });
        console.log("CLEO: Migrated localStorage to Firebase (" + lsCount + " items)");
      } else if(lsCount > fbCount) {
        fbSave({ cats, archived, subTabs, nid: _nid, ver: CURRENT_VER });
        console.log("CLEO: Local has more items (" + lsCount + " vs " + fbCount + "), pushed local to Firebase");
      } else {
        _skipFbRef.current = true;
        setCats(fbCats);
        if(fbData.archived) setArchived(fbData.archived);
        if(fbData.subTabs) setSubTabs(fbData.subTabs);
        if(fbData.nid) _nid = Math.max(_nid, fbData.nid);
        setTimeout(()=>{ _skipFbRef.current = false; }, 500);
        console.log("CLEO: Loaded from Firebase (" + fbCount + " items, local had " + lsCount + ")");
      }
    }).catch(e => console.warn("Firebase load:", e));
    const unsub = FB_DOC.onSnapshot(doc => {
      if(!doc.exists) return;
      const d = doc.data();
      if(d._lastWriter === _fbWriteId) return;
      _skipFbRef.current = true;
      if(d.cats) setCats(d.cats);
      if(d.archived) setArchived(d.archived);
      if(d.subTabs) setSubTabs(d.subTabs);
      if(d.nid) _nid = Math.max(_nid, d.nid);
      if(d.cats) lsSet(LS_CATS, d.cats);
      if(d.archived) lsSet(LS_ARCH, d.archived);
      if(d.subTabs) lsSet(LS_TABS, d.subTabs);
      setTimeout(()=>{ _skipFbRef.current = false; }, 500);
    });
    return () => unsub();
  }, []);
  const toastRef = useRef(null);
  function useDragScroll(){const ref=useRef(null);const state=useRef({isDown:false,startX:0,scrollLeft:0,moved:false});const start=e=>{const el=ref.current;if(!el)return;state.current={isDown:true,startX:e.pageX-el.offsetLeft,scrollLeft:el.scrollLeft,moved:false};el.classList.add("dragging");};const end=()=>{const el=ref.current;if(!el)return;state.current.isDown=false;el.classList.remove("dragging");};const move=e=>{const d=state.current;if(!d.isDown)return;e.preventDefault();const el=ref.current;const x=e.pageX-el.offsetLeft;const walk=(x-d.startX)*1.5;if(Math.abs(x-d.startX)>3)d.moved=true;el.scrollLeft=d.scrollLeft-walk;};return{ref,state,start,end,move};}
  const catDrag = useDragScroll();
  const subDrag = useDragScroll();

  const allItems = cats.flatMap(c=>c.subs.flatMap(s=>s.items));
  const done = allItems.filter(i=>i.done).length;
  const urgent = allItems.filter(i=>!i.done&&i.priority==="high").length;
  const MONTH_ORDER = {"Jan":1,"Feb":2,"Mar":3,"Apr":4,"May":5,"Jun":6,"Jul":7,"Aug":8,"Sep":9,"Oct":10,"Nov":11,"Dec":12};
  function deadlineSort(a,b){
    const parseD = d => { if(!d) return 999; const p=d.trim().split(" "); const m=MONTH_ORDER[p[0]]||0; const day=parseInt(p[1])||0; return m*100+day; };
    return parseD(a.deadline)-parseD(b.deadline);
  }
  const deadlinesWithContext = cats.flatMap(c=>c.subs.flatMap(s=>s.items.map(i=>({...i,_cat:c,_sub:s})))).filter(i=>!i.done&&i.deadline).sort(deadlineSort);

  function showToast(msg){ setToast(msg); if(toastRef.current)clearTimeout(toastRef.current); toastRef.current=setTimeout(()=>setToast(""),2500); }
  function snap(label){
    setUndoStack(s=>[...s.slice(-19), JSON.stringify(cats)]);
    setRedoStack([]);
    if(label){
      const ts=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
      setActionHistory(h=>[{label,ts},...h].slice(0,30));
    }
  }
  function undo(){
    if(!undoStack.length){showToast("Nothing to undo");return;}

  }
  function redo(){

  const curCat = cats.find(c=>c.id===mainTab);
  const curSubId = subTabs[mainTab] || curCat?.subs[0]?.id;

  function setSub(sid){ setSubTabs(t=>({...t,[mainTab]:sid})); }

  function toggleItem(cid,sid,iid){
    const cat=cats.find(c=>c.id===cid);
    const sub=cat?.subs.find(s=>s.id===sid);
    const item=sub?.items.find(i=>i.id===iid);
    const short=item?item.text.slice(0,30):"item";
    snap("✅ Completed: "+short);
    if(item&&!item.done){
      /* Marking done → move to archive as completed */
      const now=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
      setArchived(prev=>[{...item,done:true,_type:"done",_deletedFrom:{catId:cid,catLabel:cat.label,catColor:cat.color,catIcon:cat.icon,subId:sid,subLabel:sub.label},_deletedAt:now},...prev]);
      setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.filter(i=>i.id!==iid)})}));
      showToast("✅ Done! Moved to Completed");
    } else if(item&&item.done){
      /* Already done in list (legacy) — just toggle back */
      setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,done:false})})}));
    }
  }
  function delItem(cid,sid,iid){
    const cat=cats.find(c=>c.id===cid);
    const sub=cat?.subs.find(s=>s.id===sid);
    const item=sub?.items.find(i=>i.id===iid);
    const short=item?item.text.slice(0,30):"item";
    snap("🗑 Deleted: "+short);
    if(item){
      const now=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
      setArchived(prev=>[{...item,_type:"deleted",_deletedFrom:{catId:cid,catLabel:cat.label,catColor:cat.color,catIcon:cat.icon,subId:sid,subLabel:sub.label},_deletedAt:now},...prev]);
    }
    setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.filter(i=>i.id!==iid)})}));
    showToast("Moved to Trash — tap Undo to restore");
  }
  function restoreItem(archivedItem){
    snap("↩ Restored: "+archivedItem.text.slice(0,30));
    const {_deletedFrom,_deletedAt,_type,...item}=archivedItem;
    const restored = _type==="done" ? {...item,done:false,status:"todo"} : item;
    setCats(prev=>prev.map(c=>c.id!==_deletedFrom.catId?c:{...c,subs:c.subs.map(s=>s.id!==_deletedFrom.subId?s:{...s,items:[...s.items,restored]})}));
    setArchived(prev=>prev.filter(a=>a.id!==archivedItem.id));
    showToast("↩ Restored to "+_deletedFrom.catLabel+" → "+_deletedFrom.subLabel);
  }
  function setStatus(cid,sid,iid,status){
    snap("📋 Status → "+status);
    setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,status})})}));
  }
  function addLog(cid,sid,iid,entry){
    snap("📝 Log added");
    const now = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,log:[...(i.log||[]),`${now} — ${entry}`]})})}));
  }
  /* ── Smart auto-sort rules ── */
  const SORT_RULES = [
    {kw:/hydro|fortis|telus|shaw|internet|phone bill|utilities|cancel.*service|staff|inventory|supplier|schedule.*meet|shift|store hours|restock/i, sub:"ops"},
    {kw:/license|permit|bov|bylaw|city of|violation|renewal|legal|compliance|zoning|land.?use|development permit/i, sub:"legal"},
    {kw:/p&l|revenue|invoice|cash flow|budget|tax|pst|gst|payroll|accounting|cheque|payment/i, sub:"fin"},
    {kw:/social media|instagram|post|ad |campaign|listing|seo|marketing|brand|promo/i, sub:"mkt"},
    {kw:/contact|phone|email.*for|number for/i, sub:"con"},
    {kw:/deadline|due|expire|urgent.*by|asap/i, sub:"dl"},
    {kw:/grocery|costco|walmart|superstore|milk|eggs|bread|toilet paper|paper towel/i, sub:"groc"},
    {kw:/dentist|doctor|school|soccer|game|birthday|permission|kids|baby|daycare/i, sub:"kids"},
    {kw:/stock|reorder|fba|amazon|asin|review|return|seller/i, sub:"inv"},
    {kw:/order|shipping|refund|customer msg/i, sub:"ord"},
  ];

  function smartRoute(text, cid, sid){
    /* Try to find a better sub within the same category */
    const cat=cats.find(c=>c.id===cid); if(!cat) return {cid,sid};
    for(const rule of SORT_RULES){
      if(rule.kw.test(text)){
        const match=cat.subs.find(s=>s.id.endsWith("-"+rule.sub));
        if(match) return {cid, sid:match.id};
      }
    }
    return {cid, sid};
  }

  function addItem(cid,sid){
    const key=`${cid}-${sid}`;
    let text=(addText[key]||"").trim(); if(!text)return;
    let priority="medium",loc="";
    if(/!high|urgent/i.test(text)){priority="high";text=text.replace(/!high|urgent/gi,"").trim();}
    else if(/!low/i.test(text)){priority="low";text=text.replace(/!low/gi,"").trim();}
    const lm=text.match(/@(\S+)/); if(lm){loc=lm[1];text=text.replace(/@\S+/,"").trim();}
    const routed=smartRoute(text, cid, sid);
    snap("➕ Added: "+text.slice(0,30));
    const now=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    const newItem={id:uid(),text,done:false,priority,loc,notes:"New task — tap to add details",deadline:"",isEmail:false,status:"todo",files:[],requiredFiles:[],log:[`${now} — Task created`],chat:[]};
    setCats(prev=>prev.map(c=>c.id!==routed.cid?c:{...c,subs:c.subs.map(s=>s.id!==routed.sid?s:{...s,items:[...s.items,newItem]})}));
    setAddText(t=>({...t,[key]:""}));
    if(routed.sid!==sid){
      const destSub=cats.find(c=>c.id===routed.cid)?.subs.find(s=>s.id===routed.sid);
      showToast(`Task added → ${destSub?.label||"?"} ✓`);
      setSubTabs(t=>({...t,[routed.cid]:routed.sid}));
    } else {
      showToast("Task added ✓");
    }
  }

  return (
    <div style={{background:"#eee9e0",minHeight:"100vh",display:"flex",justifyContent:"center"}}>
    <div style={{display:"flex",flexDirection:"column",height:"100vh",width:"100%",maxWidth:420,background:"#f5f1ea",color:"#111122",fontFamily:"'Outfit',system-ui,sans-serif",fontSize:14,overflow:"hidden",position:"relative"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap');

        .cat-carousel::-webkit-scrollbar{display:none}

        .pill:hover{opacity:.85;transform:scale(1.03)}
        .pill:active{transform:scale(0.97)}
        .ecard:hover{opacity:.9}
        .delbtn:hover{color:#ff4455!important}
      `}</style>

      {/* HEADER */}
      <div style={{padding:"12px 14px 12px",borderBottom:"1px solid #00000010",flexShrink:0,position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>setCleoMenuOpen(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:6}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,background:"linear-gradient(90deg,#0a8a5c,#1a6fcc,#cc1a4f)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CLEO</div>
            <span style={{fontSize:10,color:"#999088",transition:"transform 0.2s",transform:cleoMenuOpen?"rotate(180deg)":"rotate(0deg)",display:"inline-block"}}>▼</span>
          </button>

            <button onClick={undo} style={{background:undoStack.length?"#ece7de":"#f5f1ea",border:"1px solid #00000015",borderRadius:9,color:undoStack.length?"#665e52":"#ccc5b8",fontSize:11,fontWeight:600,padding:"6px 10px",cursor:undoStack.length?"pointer":"default",display:"flex",alignItems:"center",gap:3}}>↩{undoStack.length>0&&<span style={{fontSize:9,fontWeight:700}}>{undoStack.length}</span>}</button>
            <button onClick={redo} style={{background:redoStack.length?"#ece7de":"#f5f1ea",border:"1px solid #00000015",borderRadius:9,color:redoStack.length?"#665e52":"#ccc5b8",fontSize:11,fontWeight:600,padding:"6px 10px",cursor:redoStack.length?"pointer":"default",display:"flex",alignItems:"center",gap:3}}>↪{redoStack.length>0&&<span style={{fontSize:9,fontWeight:700}}>{redoStack.length}</span>}</button>
          </div>
        </div>
        {cleoMenuOpen&&<div style={{marginTop:10,background:"#f5f1ea",border:"1px solid #ddd8cf",borderRadius:12,padding:"8px",display:"flex",flexDirection:"column",gap:4}}>
          <button onClick={()=>{setShowArchive("done");setCleoMenuOpen(false);}} style={{display:"flex",alignItems:"center",gap:8,background:"#ffffff",border:"1px solid #ddd8cf",borderRadius:9,color:"#665e52",fontSize:12,fontWeight:600,padding:"10px 12px",cursor:"pointer",textAlign:"left"}}>🗂 Archive{archived.length>0&&<span style={{background:"#ff445520",color:"#ff4455",fontSize:10,fontWeight:700,borderRadius:8,padding:"2px 7px",marginLeft:"auto"}}>{archived.length}</span>}</button>
          {actionHistory.length>0&&<div style={{background:"#ffffff",border:"1px solid #ddd8cf",borderRadius:9,padding:"8px 12px",maxHeight:150,overflowY:"auto"}}>

              <span style={{fontSize:11,color:i===0?"#111122":"#777066"}}>{a.label}</span>
              <span style={{fontSize:9,color:"#999088",flexShrink:0,marginLeft:8}}>{a.ts}</span>
            </div>)}
          </div>}
          <button onClick={async()=>{
            const syncData={_syncTime:new Date().toISOString(),cats,archived};

        </div>}
        {syncMsg&&<div style={{background:"#0a8a5c",color:"#fff",textAlign:"center",padding:"6px",borderRadius:8,fontSize:11,fontWeight:600,marginTop:6}}>{syncMsg}</div>}

        {[{id:"tasks",l:"📋 Tasks"},{id:"plan",l:"⚡ Plan"},{id:"ai",l:"🧠 AI"},{id:"alerts",l:"🔔 Alerts"}].map(t=>{

            <span style={{fontSize:11,fontWeight:800,color:"#ff4455",letterSpacing:"0.08em"}}>DEADLINES</span>
            <span style={{background:"#ff4455",color:"#fff",fontSize:9,fontWeight:800,borderRadius:10,padding:"1px 7px",minWidth:14,textAlign:"center"}}>{deadlinesWithContext.length}</span>
          </div>

            {deadlinesWithContext.map(i=>(
              <div key={i.id} onClick={()=>setDetail({item:i,cat:i._cat,sub:i._sub})} style={{display:"flex",alignItems:"center",gap:9,padding:"4px 0",fontSize:13,cursor:"pointer",borderRadius:8}} className="trow">
                <span style={{background:i._cat.color,color:"#fff",fontSize:10,fontWeight:800,padding:"3px 9px",borderRadius:20,flexShrink:0}}>{i.deadline}</span>
                <span style={{color:"#333344",flex:1,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{i.text}</span>
                <span style={{color:i._cat.color,fontSize:11,flexShrink:0}}>→</span>
              </div>

          </div>}
        </div>
      )}

      {/* NAV ROW 1 — Businesses */}
      <div style={{margin:"8px 14px 0",background:"#ffffff",border:"1px solid #ddd8cf",borderRadius:14,padding:"6px",flexShrink:0,boxShadow:"0 1px 4px #00000008"}}>
      <div className="cat-carousel" ref={catDrag.ref}
        onMouseDown={catDrag.start} onMouseLeave={catDrag.end} onMouseUp={catDrag.end} onMouseMove={catDrag.move}
        style={{display:"flex",gap:6,overflowX:"auto",flexShrink:0}}>
        {cats.map(c=>(
          <button key={c.id} className="pill" onClick={(e)=>{if(catDrag.state.current.moved){e.preventDefault();return;}setMainTab(c.id);}}
            style={{flexShrink:0,padding:"9px 16px",borderRadius:10,border:`2px solid ${mainTab===c.id?c.color+"80":"transparent"}`,background:mainTab===c.id?c.color+"18":"transparent",color:mainTab===c.id?c.color:"#665e52",fontSize:14,fontWeight:700,whiteSpace:"nowrap",letterSpacing:"0.01em",boxShadow:mainTab===c.id?`0 2px 8px ${c.color}20`:"none"}}>
            {c.icon} {c.label}
          </button>
        ))}
        <div style={{flexShrink:0,width:4}}/>
      </div>
      </div>

      {/* NAV ROW 2 — Sub tabs */}
      {curCat&&(
        <div style={{margin:"8px 14px 0",background:"#ffffff",border:"1px solid #ddd8cf",borderRadius:14,padding:"5px 6px",flexShrink:0,boxShadow:"0 1px 4px #00000008"}}>
        <div className="cat-carousel" ref={subDrag.ref}
          onMouseDown={subDrag.start} onMouseLeave={subDrag.end} onMouseUp={subDrag.end} onMouseMove={subDrag.move}
          style={{display:"flex",gap:5,overflowX:"auto",flexShrink:0}}>
          {curCat.subs.map(s=>(
            <button key={s.id} className="pill" onClick={(e)=>{if(subDrag.state.current.moved){e.preventDefault();return;}setSub(s.id);}}
              style={{flexShrink:0,padding:"5px 11px",borderRadius:10,border:`1px solid ${curSubId===s.id?curCat.color+"50":"transparent"}`,background:curSubId===s.id?curCat.color+"12":"transparent",color:curSubId===s.id?curCat.color:"#999088",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>
              {s.icon} {s.label}
            </button>
          ))}
          <div style={{flexShrink:0,width:4}}/>
        </div>
        </div>
      )}

      {/* MAIN CONTENT */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px 80px",marginTop:8}}>
        {mainTab==="tasks"&&<TasksOverview cats={cats} setMainTab={setMainTab} setSub={setSub} />}
        {mainTab==="plan"&&<PlanView cats={cats} setDetail={setDetail} />}
        {mainTab==="ai"&&<AIView cats={cats} />}
        {mainTab==="alerts"&&<AlertsView cats={cats} setMainTab={setMainTab} setDetail={setDetail} />}
        {curCat&&mainTab!=="tasks"&&mainTab!=="plan"&&mainTab!=="ai"&&curSub&&(
          <SubView cat={curCat} sub={curSub} onToggle={toggleItem} onDel={delItem} onAdd={addItem} addText={addText} setAddText={setAddText} onOpenDetail={setDetail} />
        )}
      </div>

      {/* BOTTOM QUICK ADD */}
      <QuickAdd cats={cats} setCats={setCats} snap={snap} setMainTab={setMainTab} setSubTabs={setSubTabs} showToast={showToast} uid={uid} currentTab={mainTab} currentSubTab={subTabs[mainTab]} />

      {/* DETAIL SHEET */}
      {detail&&(()=>{
        const liveCat=cats.find(c=>c.id===detail.cat.id);
        const liveSub=liveCat?.subs.find(s=>s.id===detail.sub.id);
        const liveItem=liveSub?.items.find(i=>i.id===detail.item.id);
        if(!liveCat||!liveSub||!liveItem) return null;
        return <DetailSheet item={{item:liveItem,cat:liveCat,sub:liveSub}} cats={cats} onClose={()=>setDetail(null)} onToggle={toggleItem} onSetStatus={setStatus} onAddLog={addLog}
          onEditTitle={(cid,sid,iid,val)=>{ snap("✏️ Renamed: "+val.slice(0,25)); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,text:val})})})); }}
          onEditNotes={(cid,sid,iid,val)=>{ snap("📝 Notes edited"); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,notes:val})})})); }}
          onAttachFile={(cid,sid,iid,file)=>{ snap("📎 File attached"); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,files:[...(i.files||[]),file]})})})); }}
          onRemoveFile={(cid,sid,iid,label)=>{ snap("🗑 File removed"); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,files:(i.files||[]).filter(f=>f.label!==label)})})})); }}
          onChooseDraft={(cid,sid,iid,drafts)=>{ snap("📄 Draft updated"); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,drafts})})})); }}
          onChatMsg={(cid,sid,iid,msgs)=>{ setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,chat:msgs})})})); }}
          onBatchUpdate={(cid,sid,iid,updates)=>{ snap("🔄 Task updated"); const now=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>{if(i.id!==iid)return i; const u={...i}; if(updates.notes!==undefined)u.notes=updates.notes; if(updates.status)u.status=updates.status; if(updates.deadline)u.deadline=updates.deadline; if(updates.priority)u.priority=updates.priority; if(updates.location)u.loc=updates.location; if(updates.logs)u.log=[...(u.log||[]),...updates.logs.map(l=>`${now} — ${l}`)]; return u;})})})); }}
          onDelete={delItem}
        />;
      })()}

      {/* ARCHIVE MODAL — Done & Deleted, grouped by category */}
      {showArchive&&(()=>{
        const doneItems=archived.filter(a=>a._type==="done");
        const deletedItems=archived.filter(a=>a._type!=="done");
        const archTab=showArchive; /* "done" or "deleted" or true (default to done) */
        const activeTab=(showArchive==="deleted")?"deleted":"done";
        const items=activeTab==="done"?doneItems:deletedItems;
        /* Group by category */
        const grouped={};
        items.forEach(a=>{
          const key=a._deletedFrom?.catId||"other";
          if(!grouped[key])grouped[key]={label:a._deletedFrom?.catLabel||"Other",color:a._deletedFrom?.catColor||"#999",icon:a._deletedFrom?.catIcon||"📋",items:[]};
          grouped[key].items.push(a);
        });
        return (
        <div style={{position:"absolute",inset:0,background:"#eee9e0",zIndex:200,display:"flex",flexDirection:"column"}}>
          <div style={{background:"#ffffff",width:"100%",height:"100%",display:"flex",flexDirection:"column"}}>
            <div style={{display:"none"}}/>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"13px 16px",borderBottom:"1px solid #00000010"}}>
              <button onClick={()=>setShowArchive(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#777066",fontSize:18,lineHeight:1,padding:"4px",flexShrink:0}}>←</button>
              <div style={{fontSize:14,fontWeight:800,color:"#111122",flex:1}}>🗂 Archive</div>
              <button onClick={()=>setShowArchive(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#777066",fontSize:22,lineHeight:1}}>×</button>
            </div>
            {/* Tabs: Done / Deleted */}
            <div style={{display:"flex",gap:4,padding:"8px 16px",borderBottom:"1px solid #00000008"}}>
              <button onClick={()=>setShowArchive("done")}
                style={{flex:1,padding:"8px",borderRadius:10,border:"none",background:activeTab==="done"?"#0a7a5015":"transparent",color:activeTab==="done"?"#0a7a50":"#999088",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                ✅ Completed ({doneItems.length})
              </button>
              <button onClick={()=>setShowArchive("deleted")}
                style={{flex:1,padding:"8px",borderRadius:10,border:"none",background:activeTab==="deleted"?"#ff445515":"transparent",color:activeTab==="deleted"?"#ff4455":"#999088",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                🗑 Deleted ({deletedItems.length})
              </button>
            </div>
            <div style={{overflowY:"auto",padding:"12px 16px"}}>
              {items.length===0&&<div style={{color:"#b5ac9e",fontSize:12,textAlign:"center",padding:"30px 0"}}>{activeTab==="done"?"No completed tasks yet":"No deleted tasks"}</div>}
              {Object.entries(grouped).map(([catId,group])=>(
                <div key={catId} style={{marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,padding:"4px 0"}}>
                    <span style={{fontSize:14}}>{group.icon}</span>
                    <span style={{fontSize:11,fontWeight:800,color:group.color,letterSpacing:"0.05em"}}>{group.label.toUpperCase()}</span>
                    <span style={{fontSize:10,color:"#b5ac9e"}}>({group.items.length})</span>
                  </div>
                  {group.items.map((a,i)=>(
                    <div key={a.id+"-"+i} style={{background:"#f5f1ea",border:"1px solid #ddd8cf",borderRadius:10,padding:"10px 12px",marginBottom:6,marginLeft:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#333344",flex:1}}>{a.text}</span>
                        {a.deadline&&<span style={{background:group.color,color:"#fff",fontSize:8,fontWeight:800,padding:"2px 6px",borderRadius:20}}>{a.deadline}</span>}
                      </div>
                      <div style={{fontSize:10,color:"#999088",marginBottom:8}}>
                        {a._deletedFrom.subLabel} · {activeTab==="done"?"Completed":"Deleted"} {a._deletedAt}
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>{restoreItem(a);const remaining=archived.filter(x=>x.id!==a.id);if(remaining.length===0)setShowArchive(false);}}
                          style={{background:activeTab==="done"?"#0a7a50":"#665e52",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:11,padding:"6px 14px",cursor:"pointer"}}>
                          ↩ {activeTab==="done"?"Reopen":"Restore"}
                        </button>
                        <button onClick={()=>{setArchived(prev=>prev.filter(x=>x.id!==a.id));const remaining=archived.filter(x=>x.id!==a.id);if(remaining.length===0)setShowArchive(false);showToast("Permanently deleted");}}
                          style={{background:"none",border:"1px solid #ff445530",borderRadius:8,color:"#ff4455",fontWeight:700,fontSize:11,padding:"6px 14px",cursor:"pointer"}}>
                          🗑 Delete Forever
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </div>
        );
      })()}

      {/* TOAST */}
      {toast&&<div style={{position:"absolute",bottom:72,left:"50%",transform:"translateX(-50%)",background:"#e6e0d5",border:"1px solid #00000020",color:"#111122",padding:"8px 18px",borderRadius:20,fontSize:12,zIndex:999,whiteSpace:"nowrap",pointerEvents:"none"}}>{toast}</div>}
    </div>
    </div>
  );
}

function TasksOverview({cats,setMainTab,setSub}){
  return (
    <div>
      {cats.map(c=>{
        const items=c.subs.flatMap(s=>s.items);
        const done=items.filter(i=>i.done).length;
        const urgent=items.filter(i=>!i.done&&i.priority==="high").slice(0,3);
        const pct=items.length?Math.round(done/items.length*100):0;
        return (
          <div key={c.id} style={{background:"#ffffff",border:`1px solid ${c.color}20`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
            <button onClick={()=>setMainTab(c.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"12px 14px",background:"none",border:"none",color:"#111122",cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:18}}>{c.icon}</span>
              <span style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:800,color:c.color,flex:1}}>{c.label.toUpperCase()}</span>
              <div style={{width:50,height:3,background:"#00000012",borderRadius:10,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:c.color,transition:"width .4s"}}/>
              </div>
              <span style={{fontSize:10,color:"#999088",margin:"0 4px"}}>{done}/{items.length}</span>
              <span style={{fontSize:10,color:c.color}}>→</span>
            </button>
            {urgent.length>0&&(
              <div style={{borderTop:`1px solid #0000000a`,padding:"6px 14px 10px"}}>
                {urgent.map(i=>(
                  <div key={i.id} style={{display:"flex",alignItems:"center",gap:7,padding:"3px 0",fontSize:12}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:"#ff4455",flexShrink:0}}/>
                    <span style={{flex:1,color:"#333344",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.text}</span>
                    {i.deadline&&<span style={{background:"#d50000",color:"#fff",fontSize:8,fontWeight:800,padding:"1px 5px",borderRadius:20}}>{i.deadline}</span>}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function SubView({cat,sub,onToggle,onDel,onAdd,addText,setAddText,onOpenDetail}){
  const key=`${cat.id}-${sub.id}`;
  const done=sub.items.filter(i=>i.done).length;
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 2px 10px"}}>
        <div style={{fontSize:12,color:cat.color,fontWeight:700}}>{sub.icon} {sub.label}</div>
        <div style={{fontSize:10,color:"#999088"}}>{done}/{sub.items.length} done</div>
      </div>
      <div style={{background:"#ffffff",border:`1px solid ${cat.color}18`,borderRadius:14,overflow:"hidden",marginBottom:10}}>
        {sub.items.length===0&&<div style={{padding:20,textAlign:"center",color:"#b5ac9e",fontSize:12}}>Nothing here yet — add below</div>}
        {sub.items.map(i=>i.isEmail
          ? <EmailCard key={i.id} item={i} cat={cat} sub={sub} onToggle={onToggle} onDel={onDel} onOpen={onOpenDetail}/>
          : <TaskRow key={i.id} item={i} cat={cat} sub={sub} onToggle={onToggle} onDel={onDel} onOpen={onOpenDetail}/>
        )}
        <div style={{display:"flex",gap:6,padding:"8px 10px",borderTop:"1px solid #0000000a"}}>
          <input value={addText[key]||""} onChange={e=>setAddText(t=>({...t,[key]:e.target.value}))}
            onKeyDown={e=>e.key==="Enter"&&onAdd(cat.id,sub.id)}
            placeholder="Add task... (!high urgent, @Location)"
            style={{flex:1,background:"#00000007",border:"1px solid #00000010",borderRadius:9,padding:"8px 11px",color:"#111122",fontSize:12,outline:"none"}}/>
          <button onClick={()=>onAdd(cat.id,sub.id)} style={{width:34,background:cat.color,border:"none",borderRadius:9,color:"#fff",fontSize:18,fontWeight:900,cursor:"pointer"}}>+</button>
        </div>
      </div>
    </div>
  );
}

function TaskRow({item,cat,sub,onToggle,onDel,onOpen}){
  const p=PRI[item.priority];
  const st=safeStatus(item.status||"todo");
  /* Extract steps: numbered (1. 2.) or bullets (• ✅) */
  const steps=(item.notes||"").split("\n").filter(l=>/^\d+\.\s|^\s*[•·\-]\s|^\s*✅\s/.test(l.trim())).slice(0,4);
  const hasSteps=steps.length>0;
  const hasRichContent=hasSteps||item.deadline||item.status;

  if(!hasRichContent){
    /* Simple row for basic tasks */
    return (
      <div className="trow" style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:"1px solid #00000008",opacity:item.done?0.4:1,cursor:"pointer"}} onClick={()=>onOpen({item,cat,sub})}>
        <button onClick={e=>{e.stopPropagation();onToggle(cat.id,sub.id,item.id);}}
          style={{width:20,height:20,borderRadius:6,border:item.done?"none":"1.5px solid #00000035",background:item.done?"#2effa8":"none",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"#08080f"}}>
          {item.done?"✓":""}
        </button>
        <span style={{flex:1,fontSize:12,textDecoration:item.done?"line-through":"none",color:"#111122"}}>{item.text}</span>
        <span style={{background:p.bg,color:p.color,fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:20,letterSpacing:"0.05em",flexShrink:0}}>{p.label}</span>
        <button className="delbtn" onClick={e=>{e.stopPropagation();onDel(cat.id,sub.id,item.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc5b8",fontSize:15,padding:"0 2px",lineHeight:1}}>×</button>
      </div>
    );
  }

  /* Rich card for tasks with steps/deadline/status */
  return (
    <div className="tcard" style={{margin:"8px 10px 4px",background:"#ece7de",borderRadius:12,overflow:"hidden",border:`1px solid ${cat.color}25`,cursor:"pointer"}} onClick={()=>onOpen({item,cat,sub})}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px"}}>
        <span style={{flex:1,fontSize:12,fontWeight:700,color:"#111122",lineHeight:1.35}}>{item.text}</span>
        {item.deadline&&<span style={{background:"#d50000",color:"#fff",fontSize:8,fontWeight:800,padding:"2px 6px",borderRadius:20,flexShrink:0}}>{item.deadline}</span>}
        <span style={{background:p.bg,color:p.color,fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:20,letterSpacing:"0.05em",flexShrink:0}}>{p.label}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"0 12px 8px"}}>
        <span style={{background:st.bg,color:st.color,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,letterSpacing:"0.05em"}}>{st.icon} {st.label}</span>
        {item.log&&item.log.length>0&&<span style={{fontSize:10,color:"#999088",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Latest: {item.log[item.log.length-1]}</span>}
      </div>
      {hasSteps&&(
        <div style={{padding:"0 12px 8px"}}>
          {steps.map((l,i)=>{
            const isDone=/^\s*✅/.test(l);
            const cleaned=l.trim().replace(/^[•·\-]\s*/,"").replace(/^✅\s*/,"").replace(/^\d+\.\s*/,"");
            return <div key={i} style={{display:"flex",gap:7,padding:"2px 0",fontSize:11,color:isDone?"#0a7a50":"#665e52",opacity:isDone?0.6:1}}>
              <span style={{flexShrink:0,fontSize:10}}>{isDone?"✅":"◻️"}</span>
              <span style={{textDecoration:isDone?"line-through":"none"}}>{cleaned}</span>
            </div>;
          })}
        </div>
      )}
      <div style={{display:"flex",gap:6,padding:"7px 10px",borderTop:"1px solid #00000008"}} onClick={e=>e.stopPropagation()}>
        <button onClick={()=>onToggle(cat.id,sub.id,item.id)} style={{flex:1,background:item.done?"#0000000a":cat.color+"20",border:`1px solid ${item.done?"#00000012":cat.color+"40"}`,borderRadius:8,color:item.done?"#777066":cat.color,fontSize:11,fontWeight:600,padding:"5px",cursor:"pointer"}}>{item.done?"✓ Done":"Mark Done"}</button>
        <button onClick={()=>onOpen({item,cat,sub})} style={{flex:1,background:"#0000000a",border:"1px solid #00000008",borderRadius:8,color:"#777066",fontSize:11,padding:"5px",cursor:"pointer"}}>Full Details →</button>
        <button onClick={()=>onDel(cat.id,sub.id,item.id)} style={{background:"none",border:"1px solid #ff445520",borderRadius:8,color:"#ff4455",fontSize:11,padding:"5px 10px",cursor:"pointer"}}>Del</button>
      </div>
    </div>
  );
}

function EmailCard({item,cat,sub,onToggle,onDel,onOpen}){
  const p=PRI[item.priority];
  const lines=(item.notes||"").split("\n").filter(l=>/^\d+\./.test(l.trim())).slice(0,4);
  const st = safeStatus(item.status||"todo");
  return (
    <div className="ecard" style={{margin:"8px 10px 4px",background:"#ece7de",borderRadius:12,overflow:"hidden",border:`1px solid ${cat.color}25`,cursor:"pointer"}} onClick={()=>onOpen({item,cat,sub})}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px"}}>
        <span style={{background:cat.color+"20",color:cat.color,fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20,flexShrink:0}}>📧 EMAIL</span>
        <span style={{flex:1,fontSize:12,fontWeight:700,color:"#111122",lineHeight:1.35}}>{item.text}</span>
        {item.deadline&&<span style={{background:"#d50000",color:"#fff",fontSize:8,fontWeight:800,padding:"2px 6px",borderRadius:20,flexShrink:0}}>{item.deadline}</span>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"0 12px 8px"}}>
        <span style={{background:st.bg,color:st.color,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,letterSpacing:"0.05em"}}>{st.icon} {st.label}</span>
        {item.subject&&<div style={{fontSize:11,color:"#665e52",padding:"0 12px 4px",fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📧 {item.subject}</div>}
      {(item.sender||item.dateReceived)&&<div style={{fontSize:10,color:"#999088",padding:"0 12px 6px",display:"flex",gap:10}}>
        {item.sender&&<span>👤 {item.sender}</span>}
        {item.dateReceived&&<span>📅 {item.dateReceived}</span>}
      </div>}
      {item.log&&item.log.length>0&&<span style={{fontSize:10,color:"#999088",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 12px 4px"}}>Latest: {item.log[item.log.length-1]}</span>}
      </div>
      {lines.length>0&&(
        <div style={{padding:"0 12px 8px"}}>
          {lines.map((l,i)=>{
            const m=l.match(/^(\d+)\.\s*(.+)/);
            return m?<div key={i} style={{display:"flex",gap:7,padding:"2px 0",fontSize:11,color:"#665e52"}}>
              <span style={{color:cat.color,fontWeight:700,flexShrink:0,fontSize:10}}>{m[1]}.</span>
              <span>{m[2]}</span>
            </div>:null;
          })}
        </div>
      )}
      <div style={{display:"flex",gap:6,padding:"7px 10px",borderTop:"1px solid #0000000a"}} onClick={e=>e.stopPropagation()}>

function DetailSheet({item:di,cats,onClose,onToggle,onSetStatus,onAddLog,onEditTitle,onEditNotes,onAttachFile,onRemoveFile,onChooseDraft,onChatMsg,onBatchUpdate,onDelete}){

  const [focusedDraft,setFocusedDraft]=useState(null);
  const [feedbackHistory,setFeedbackHistory]=useState([]);
  const [taskChat,setTaskChat]=useState("");
  const [chatLoading,setChatLoading]=useState(false);
  const [chatFiles,setChatFiles]=useState([]);
  const [logOpen,setLogOpen]=useState(false);
  const [notesOpen,setNotesOpen]=useState(true);
  const chatEndRef=useRef(null);
  const chatFileRef=useRef(null);

  function handlePaste(e){
    const items=e.clipboardData?.items;
    if(!items)return;
    for(let i=0;i<items.length;i++){
      if(items[i].type.startsWith("image/")){
        e.preventDefault();
        const file=items[i].getAsFile();
        if(!file)continue;
        const reader=new FileReader();
        reader.onload=(ev)=>{
          const ts=Date.now();
          const name=`screenshot-${new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}).replace(/[: ]/g,"")}.png`;
          setChatFiles(prev=>[...prev,{name,size:file.size,preview:ev.target.result}]);
        };
        reader.readAsDataURL(file);
        break;
      }
    }
  }
  useEffect(()=>{setTitleVal(item.text);},[item.text]);
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[item.chat,chatLoading]);

  async function sendChatMsg(){
    const msg=taskChat.trim(); if(!msg||chatLoading) return;
    setTaskChat("");
    const prevChat=item.chat||[];
    const fileNames=chatFiles.map(f=>f.name);
    const previews=chatFiles.filter(f=>f.preview).map(f=>f.preview);
    const fullMsg=fileNames.length>0?msg+"\n📎 Attached: "+fileNames.join(", "):msg;
    if(chatFiles.length>0){
      chatFiles.forEach(f=>onAttachFile(cat.id,sub.id,item.id,{label:f.name,name:f.name,size:f.size,preview:f.preview||null}));
      setChatFiles([]);
    }
    const newChat=[...prevChat,{from:"joe",text:fullMsg,ts:new Date().toISOString(),previews:previews.length>0?previews:undefined}];
    onChatMsg(cat.id,sub.id,item.id,newChat);
    const shortMsg=msg.length>60?msg.slice(0,60)+"…":msg;
    onAddLog(cat.id,sub.id,item.id,`💬 Joe: ${shortMsg}`);

    const key=(lsGet(LS_KEY,"")||DEFAULT_KEY);
    if(!key){
      const cleoReply=[...newChat,{from:"cleo",text:"Got it — saved your update. I'll process this when you sync with Cowork. 💬",ts:new Date().toISOString()}];
      onChatMsg(cat.id,sub.id,item.id,cleoReply);
      return;
    }
    setChatLoading(true);
    const hdrs={"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    try{
      const taskCtx=`Task: ${item.text}\nCategory: ${cat.label} > ${sub.label}\nPriority: ${item.priority}\nStatus: ${item.status||"todo"}\nDeadline: ${item.deadline||"none"}\nLocation: ${item.loc||"none"}`;
      const chatHistory=newChat.map(m=>{
        const role=m.from==="joe"?"user":"assistant";
        if(role==="user"&&m.previews&&m.previews.length>0){
          const content=[];
          m.previews.forEach(src=>{
            const b64=src.replace(/^data:image\/\w+;base64,/,"");
            const mtype=src.match(/^data:(image\/\w+);/)?.[1]||"image/png";
            content.push({type:"image",source:{type:"base64",media_type:mtype,data:b64}});
          });
          content.push({type:"text",text:m.text});
          return {role,content};
        }
        return {role,content:m.text};
      });

      /* ── STEP 1: Chat reply ── */
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:hdrs,
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:600,
          system:`You are CLEO, Joe's AI executive assistant. You help manage tasks across his businesses (ARCannabis, Paper Pals, Amazon Seller, Personal). Today: ${new Date().toDateString()}.\n\nCurrent task context:\n${taskCtx}\nCurrent notes:\n${item.notes||"(none)"}\n\nRULES:\n- Be concise, warm, actionable. 2-4 sentences max.\n- When Joe asks to update something, CONFIRM what you changed (deadline, status, reminder, notes).\n- If Joe mentions a date/deadline, confirm the exact date.\n- If Joe says something is done, confirm you're marking it done.\n- If Joe mentions a person or contact, acknowledge you're saving it.\n- Always end with what happens next or what Joe needs to do.\n- Never say "I can't do that" — you update everything.\n- MESSY INPUT: Joe types fast and messy. He also copy/pastes messages from other people (like Lily, his partner, or friends). When you see pasted text from someone else, acknowledge it naturally ("Got it, added Lily's items to the list" or "Noted — I pulled the details from that message").\n- SMART FORMAT: For grocery/shopping tasks, confirm how many items you added to the list. For business tasks, confirm what you updated in the notes.\n- CHECKLIST TASKS: If this is clearly a list task (groceries, shopping, supplies, packing), keep responses short: "Added X items to your list. Y items total now." Don't over-explain.\n- SCREENSHOTS: Joe may paste screenshots of emails, documents, or messages. When you see an image, READ IT CAREFULLY — extract all key details (names, account numbers, amounts, dates, addresses, deadlines) and confirm what you found. Build structured notes from the screenshot content.`,
          messages:chatHistory
        })
      });
      const d=await r.json();
      if(d.error){
        if(d.error.type==="authentication_error"){lsSet(LS_KEY,"");onChatMsg(cat.id,sub.id,item.id,[...newChat,{from:"cleo",text:"API key invalid. Try sending another message and I'll ask for a new key."}]);}
        else{onChatMsg(cat.id,sub.id,item.id,[...newChat,{from:"cleo",text:"Error: "+(d.error.message||"Something went wrong. Try again.")}]);}
        setChatLoading(false);return;
      }
      const reply=d.content?.find(b=>b.type==="text")?.text||"Hmm, I didn't get a response. Try again.";
      const finalChat=[...newChat,{from:"cleo",text:reply}];
      onChatMsg(cat.id,sub.id,item.id,finalChat);

      /* ── STEP 2: Auto-rebuild notes + extract structured updates ── */
      const allMsgs=finalChat.map(m=>`${m.from==="joe"?"Joe":"CLEO"}: ${m.text}`).join("\n");
      const r2=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:hdrs,
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1500,
          system:`You are CLEO's backend processor. Based on the chat conversation, you MUST return a JSON object with these fields. Return ONLY valid JSON, nothing else.

{
  "notes": "Structured notes for this task (see format below)",
  "status": "todo|inprog|pending|done or null if no change",
  "deadline": "Short date like 'Apr 15' or null if no change",
  "logs": ["Array of new activity log entries describing what changed"],
  "priority": "high|medium|low or null if no change",
  "location": "Full address if mentioned (e.g. '5755 Mountain View Blvd, Ladner BC') or null if no location"
}

STEP 1 — DETECT FORMAT:
Look at the task title, category, and conversation. Pick the RIGHT format:

FORMAT A — CHECKLIST (use for grocery lists, shopping lists, packing lists, to-do lists, supplies, errands, any list of items to buy/get/do):
Notes should be a bullet list using • for each item. Group items if logical. Example:
• Milk
• Eggs x2 dozen
• Bread — whole wheat
• Chicken thighs (family pack)

If Joe or someone else sends a messy list (even copy/pasted texts), clean it up into neat • bullet items. Combine duplicates. Add quantities if mentioned.

FORMAT B — STRUCTURED NOTES (use for business tasks, legal matters, emails, contacts, meetings, anything that needs context/status/steps):

CONTACT
[Name, role, phone, email — each on its own line]

SITUATION
[Point form — short scannable lines. NOT paragraphs. Each key fact on its own line:]
Account #12201166
Service at 438 Richards St, Vancouver BC V6B 2Z3
Missed payment — $40.12 overdue
Account being cancelled — deadline Apr 15
[Pull out every key detail: account numbers, amounts, addresses, dates, names, reference numbers — each gets its own line. Joe needs to scan this in 3 seconds.]

STATUS
[One line — what's the current state]

NEXT STEPS
• [Bullet list — use • for incomplete, ✅ for done steps]

CONTACT
[Name, phone, email — each on own line. Only if there's contact info.]

IF NO REPLY
[Escalation plan — only if relevant]

FORMATTING RULES:
- NEVER write paragraphs. Everything is short point-form lines.
- Each fact gets its own line
- Numbers, amounts, dates, account numbers — always pull them out visibly
- Joe scans, he doesn't read. Format for scanning.
- Use ONLY sections that apply — don't include empty sections
- USE SMART CONTEXTUAL HEADERS — don't always use the same headers. Pick headers that fit the task:
  - Soccer game? → GAME DETAILS, TRAVEL, SCHEDULE, WHAT TO BRING
  - Email/business? → SITUATION, STATUS, NEXT STEPS, CONTACT
  - Legal matter? → SITUATION, DOCUMENTS NEEDED, DEADLINE, CONTACT
  - Shopping/errands? → Just bullet checklist, no headers needed
  - Meeting? → AGENDA, KEY DETAILS, FOLLOW UP
  - Invoice/payment? → ACCOUNT DETAILS, AMOUNT, DEADLINE
- Headers should be ALL CAPS on their own line. Content below in point form.
- If task has a location/address, DO NOT put the address in the notes. Instead ONLY set it in the "location" field in the JSON response. The app has a dedicated clickable Google Maps card for the location — no need to duplicate it in the notes. You can mention the place NAME in the notes (e.g. "Dugald Morrison Park") but NOT the full street address — that goes in the location field only.

STEP 2 — HANDLE MESSY INPUT:
Joe types fast and messy. He also copy/pastes messages from other people (like Lily, his partner). When you see pasted messages:
- Extract the useful info (items, requests, details)
- Clean it up and merge into the existing notes
- Don't lose any items — if Lily says "get diapers and wipes" those become bullet items
- If someone asks for multiple things, each becomes its own bullet

RULES:
- Keep Joe's facts from existing notes — don't drop info the chat didn't contradict
- Clean up language but keep Joe's tone — professional, not stiff
- Do NOT invent information
- MERGE new info with existing notes — don't replace everything, ADD to what's there
- For checklists: keep existing items, add new ones at the bottom
- For "logs": summarize what CLEO just did (e.g. "Updated deadline to Apr 15", "Status → IN PROGRESS", "Added 5 items to grocery list"). Always include at least one log entry.
- For "status": if Joe says something is done → "done". If work is happening → "inprog". If waiting on someone → "pending". If no signal → null.
- For "deadline": only set if Joe explicitly mentions a date. Format as "Mon DD, YYYY" (e.g. "Apr 15, 2026"). ALWAYS include the year. null if no change.
- For "priority": only change if Joe explicitly says urgent/high/low. null if no change.`,
          messages:[{role:"user",content:`Task: ${item.text}\nCategory: ${cat.label} > ${sub.label}\nCurrent status: ${item.status||"todo"}\nCurrent deadline: ${item.deadline||"none"}\nCurrent priority: ${item.priority}\n\nExisting notes:\n${item.notes||"(none)"}\n\nFull chat history:\n${allMsgs}`}]
        })
      });
      const d2=await r2.json();
      if(!d2.error){
        const raw=d2.content?.find(b=>b.type==="text")?.text||"";
        try{
          /* Parse JSON — handle markdown code fences if present */
          const cleaned=raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
          const parsed=JSON.parse(cleaned);
          const updates={};
          if(parsed.notes&&parsed.notes.trim()) updates.notes=parsed.notes.trim();
          if(parsed.status&&["todo","inprog","pending","done"].includes(parsed.status)) updates.status=parsed.status;
          if(parsed.deadline) updates.deadline=parsed.deadline;
          if(parsed.priority&&["high","medium","low"].includes(parsed.priority)) updates.priority=parsed.priority;
          if(parsed.location&&parsed.location.trim()) updates.location=parsed.location.trim();
          const logs=parsed.logs||[];
          /* Add CLEO reply summary to log */

          logs.push(`🤖 CLEO: ${replyShort}`);
          updates.logs=logs;
          onBatchUpdate(cat.id,sub.id,item.id,updates);

        }
      }
    }catch(e){
      onChatMsg(cat.id,sub.id,item.id,[...newChat,{from:"cleo",text:"Connection error — check your internet and try again."}]);
    }
    setChatLoading(false);
  }

  function saveTitle(){const v=titleVal.trim();if(v&&v!==item.text){onEditTitle(cat.id,sub.id,item.id,v);}setEditingTitle(false);}
  return (
    <div style={{position:"absolute",inset:0,background:"#00000040",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:10}} onClick={e=>e.target===e.currentTarget&&onClose()}>

        {(()=>{

        <div style={{overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>

              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>📍</span>
                <div style={{flex:1}}>

                  <div style={{fontSize:10,color:"#999088",marginTop:2}}>Tap to open in Google Maps →</div>
                </div>
                <span style={{fontSize:16,color:"#1a6fcc"}}>↗</span>
              </div>
            </a>
          </div>}
          {/* FILES SECTION */}
          <div>
            <div style={{fontSize:9,color:"#999088",letterSpacing:"0.08em",marginBottom:6}}>📎 FILES</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {(item.requiredFiles||[]).map((req,i)=>{
                const attached=(item.files||[]).find(f=>f.label===req);
                return (
                  <div key={i} style={{borderRadius:10,border:`2px solid ${attached?"#2effa8":"#ddd8cf"}`,background:attached?"#e8fff5":"#fafafa",padding:"10px 12px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:16}}>{attached?"✅":"📋"}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#333344"}}>{req}</div>
                        {attached&&<div style={{fontSize:11,color:"#0a7a50",marginTop:2,fontWeight:600}}>📎 {attached.name}</div>}
                        {!attached&&<div style={{fontSize:10,color:"#b5ac9e",marginTop:1}}>No file attached yet</div>}
                      </div>
                      {attached
                        ?<button onClick={()=>onRemoveFile(cat.id,sub.id,item.id,req)}
                           style={{background:"#ff445515",border:"1px solid #ff445540",borderRadius:20,color:"#ff4455",fontSize:12,fontWeight:700,width:28,height:28,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                        :<label style={{background:"#111122",color:"#fff",fontSize:11,fontWeight:700,padding:"6px 14px",borderRadius:20,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
                           + Attach
                           <input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style={{display:"none"}} onChange={e=>{
                             const file=e.target.files[0];if(!file)return;
                             onAttachFile(cat.id,sub.id,item.id,{label:req,name:file.name,size:file.size});
                           }}/>
                         </label>
                      }
                    </div>
                  </div>
                );
              })}
              {(item.files||[]).filter(f=>!(item.requiredFiles||[]).includes(f.label)).map((f,i)=>(

                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#0a7a50"}}>📎 {f.name}</div>
                    <div style={{fontSize:10,color:"#0a5a3a"}}>Extra attachment</div>
                  </div>
                  <button onClick={()=>onRemoveFile(cat.id,sub.id,item.id,f.label)}
                    style={{background:"#ff445515",border:"1px solid #ff445540",borderRadius:20,color:"#ff4455",fontSize:12,fontWeight:700,width:28,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              ))}
              <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer",fontSize:11,color:"#777066",background:"#fff",border:"1px dashed #ccccdd",borderRadius:10,padding:"9px",marginTop:2}}>
                📎 Attach extra file
                <input type="file" style={{display:"none"}} onChange={e=>{
                  const file=e.target.files[0];if(!file)return;
                  onAttachFile(cat.id,sub.id,item.id,{label:file.name,name:file.name,size:file.size});
                  e.target.value="";
                }}/>
              </label>
            </div>
            {(item.requiredFiles||[]).length>0 && (item.requiredFiles||[]).every(r=>(item.files||[]).find(f=>f.label===r)) && (
              <div style={{background:"#e8fff5",border:"2px solid #2effa8",borderRadius:10,padding:"12px",marginTop:8,fontSize:13,color:"#0a5a3a",fontWeight:700,textAlign:"center"}}>
                ✅ All files ready — Joe, review and confirm send!
              </div>
            )}
          </div>

          {/* EMAIL DRAFT SECTION */}
          {item.drafts&&<div>
            <div style={{fontSize:9,color:"#999088",letterSpacing:"0.08em",marginBottom:6}}>📧 EMAIL DRAFT — {item.drafts.subject}</div>

            {/* BOTH VERSIONS — picking stage */}
            {!item.drafts.chosen&&!focusedDraft&&["v1","v2"].map((vk,vi)=>{
              const vNum=vi+1;
              const subtitle=vk==="v1"?item.drafts.v1Label||"":item.drafts.v2Label||"";
              return (
                <div key={vk} style={{background:"#fff",border:`2px solid ${vi===0?"#d5000030":"#ddd8cf"}`,borderRadius:12,padding:"12px 14px",marginBottom:10}}>

                    {subtitle?<span style={{fontSize:11,fontWeight:700,color:vi===0?"#d50000":"#665e52"}}>{subtitle}</span>
                    :<span style={{fontSize:11,fontWeight:700,color:"#665e52"}}>{"VERSION "+vNum}</span>}
                  </div>
                  <div style={{fontSize:12,color:"#333344",lineHeight:1.75,whiteSpace:"pre-wrap",maxHeight:300,overflowY:"auto",marginBottom:10,padding:"8px 10px",background:"#f5f1ea",borderRadius:8}}>{item.drafts[vk]}</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{
                      const updated={...item.drafts,chosen:vk};
                      onChooseDraft(cat.id,sub.id,item.id,updated);
                    }}
                      style={{flex:1,background:vi===0?"#d50000":"#665e52",border:"none",borderRadius:9,color:"#fff",fontWeight:700,fontSize:12,padding:"10px",cursor:"pointer"}}>
                      ✓ Use Version {vNum}
                    </button>
                    <button onClick={()=>{setFocusedDraft(vk);setDraftFeedback("");setFeedbackHistory([]);}}
                      style={{flex:1,background:"none",border:"2px solid #ffe0a0",borderRadius:9,color:"#aa7700",fontWeight:700,fontSize:12,padding:"10px",cursor:"pointer"}}>
                      ✏️ Edit Version {vNum}
                    </button>
                  </div>
                </div>
              );
            })}

            {/* FOCUSED VERSION — editing back and forth with CLEO */}
            {!item.drafts.chosen&&focusedDraft&&(()=>{
              const vk=focusedDraft;
              const vNum=vk==="v1"?1:2;
              const subtitle=vk==="v1"?item.drafts.v1Label||"":item.drafts.v2Label||"";
              const chatMsgs=item.drafts.chat||[];
              return (
                <div>
                  <div style={{background:"#fff",border:"2px solid #d5000030",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#d50000"}}>{subtitle||"VERSION "+vNum} — EDITING</span>
                      <button onClick={()=>{setFocusedDraft(null);setDraftFeedback("");setFeedbackHistory([]);}}
                        style={{background:"none",border:"1px solid #ccccdd",borderRadius:6,color:"#999088",fontSize:10,fontWeight:600,padding:"3px 10px",cursor:"pointer"}}>
                        ← Back to both
                      </button>
                    </div>
                    <div style={{fontSize:12,color:"#333344",lineHeight:1.75,whiteSpace:"pre-wrap",maxHeight:300,overflowY:"auto",marginBottom:10,padding:"8px 10px",background:"#f5f1ea",borderRadius:8}}>{item.drafts[vk]}</div>
                  </div>

                  {/* CHAT THREAD */}
                  <div style={{background:"#f5f1ea",border:"1px solid #ddd8cf",borderRadius:12,padding:"10px",marginBottom:10}}>
                    <div style={{fontSize:9,color:"#999088",letterSpacing:"0.08em",marginBottom:8}}>💬 CHAT WITH CLEO</div>
                    <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                      {/* Hardcoded chat history from drafts.chat */}
                      {chatMsgs.map((msg,mi)=>(
                        <div key={"hc"+mi} style={{
                          alignSelf:msg.from==="joe"?"flex-end":"flex-start",
                          maxWidth:"85%",
                          background:msg.from==="joe"?"#111122":"#fffbf0",
                          color:msg.from==="joe"?"#fff":"#333344",
                          border:msg.from==="joe"?"none":"1px solid #ffe0a0",
                          borderRadius:msg.from==="joe"?"12px 12px 4px 12px":"12px 12px 12px 4px",

                      ))}
                      {/* In-session messages from feedbackHistory */}
                      {feedbackHistory.map((fb,fi)=>(
                        <div key={"fb"+fi} style={{
                          alignSelf:"flex-end",maxWidth:"85%",
                          background:"#111122",color:"#fff",
                          borderRadius:"12px 12px 4px 12px",
                          padding:"8px 11px",fontSize:12,lineHeight:1.5

                      ))}
                      {feedbackHistory.length>0&&(
                        <div style={{
                          alignSelf:"flex-start",maxWidth:"85%",
                          background:"#fffbf0",border:"1px solid #ffe0a0",

                          padding:"8px 11px",fontSize:12,lineHeight:1.5

                          <div style={{fontSize:9,fontWeight:700,color:"#aa7700",marginBottom:3}}>CLEO</div>

                        </div>
                      )}
                      {chatMsgs.length===0&&feedbackHistory.length===0&&(
                        <div style={{color:"#b5ac9e",fontSize:11,fontStyle:"italic",textAlign:"center",padding:"8px 0"}}>Tell me what to change and I'll update the draft above.</div>
                      )}
                    </div>
                    {/* INPUT */}
                    <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
                      <textarea value={draftFeedback} onChange={e=>setDraftFeedback(e.target.value)}
                        placeholder={"What should I change?"}
                        onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(draftFeedback.trim()){setFeedbackHistory(h=>[...h,draftFeedback.trim()]);setDraftFeedback("");}}}}
                        style={{flex:1,background:"#fff",border:"1px solid #ddd8cf",borderRadius:10,padding:"9px 11px",fontSize:12,color:"#333344",lineHeight:1.4,resize:"none",minHeight:38,maxHeight:80,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                      <button onClick={()=>{if(draftFeedback.trim()){setFeedbackHistory(h=>[...h,draftFeedback.trim()]);setDraftFeedback("");}}}
                        disabled={!draftFeedback.trim()}
                        style={{background:draftFeedback.trim()?"#aa7700":"#dddddd",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:18,width:38,height:38,cursor:draftFeedback.trim()?"pointer":"default",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        ↑
                      </button>
                    </div>
                  </div>

                  {/* USE THIS VERSION */}
                  <button onClick={()=>{
                    const updated={...item.drafts,chosen:vk};
                    onChooseDraft(cat.id,sub.id,item.id,updated);
                    setFocusedDraft(null);
                  }}
                    style={{width:"100%",background:"#0a7a50",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:13,padding:"12px",cursor:"pointer",marginBottom:6}}>
                    ✓ Use This Version
                  </button>
                </div>

            {/* CONFIRMED — ready to send */}

                  <div style={{fontSize:12,color:"#333344",lineHeight:1.75,whiteSpace:"pre-wrap",padding:"8px 10px",background:"#f0fff5",borderRadius:8}}>{item.drafts[item.drafts.chosen]}</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{
                    navigator.clipboard.writeText(item.drafts[item.drafts.chosen]);
