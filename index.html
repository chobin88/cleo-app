// ── GLOBAL EXPORT HOTKEY: Ctrl+Shift+E dumps ALL localStorage ──
window.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.shiftKey && (e.key === "E" || e.key === "e")){
    e.preventDefault();
    try{
      var dump = {};
      for(var i=0; i<localStorage.length; i++){
        var k = localStorage.key(i);
        dump[k] = localStorage.getItem(k);
      }
      var blob = new Blob([JSON.stringify(dump, null, 2)], {type: "application/json"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "cleo-full-backup-" + Date.now() + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      alert("FULL BACKUP DOWNLOADED! Check your Downloads folder.\n\nKeys exported: " + Object.keys(dump).length);
    } catch(err){
      alert("Export failed: " + err.message);
    }
  }
});
console.log("🔑 Global export hotkey ready: Ctrl+Shift+E dumps all localStorage");

// ── GLOBAL IMPORT HOTKEY: Ctrl+Shift+L loads a backup JSON into localStorage ──
window.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.shiftKey && (e.key === "L" || e.key === "l")){
    e.preventDefault();
    var input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,application/json";
    input.onchange = function(ev){
      var file = ev.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(evt){
        try{
          var data = JSON.parse(evt.target.result);
          var keys = Object.keys(data);
          if(!confirm("Import backup?\n\nThis will OVERWRITE your current CLEO data with "+keys.length+" keys from:\n"+file.name+"\n\nContinue?")) return;
          // Clear current localStorage, then populate from backup
          localStorage.clear();
          keys.forEach(function(k){
            localStorage.setItem(k, data[k]);
          });
          alert("✅ Backup imported! "+keys.length+" keys restored.\n\nPage will reload to show your data.");
          location.reload();
        } catch(err){
          alert("Import failed: " + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }
});
console.log("🔑 Global import hotkey ready: Ctrl+Shift+L loads a backup JSON");

// ── AUTO-REFRESH ON NEW DEPLOY ──
// When a fresh deploy is detected (DEPLOY_VERSION changed), wipe stale localStorage
// so the fresh baked-in DATA_SNAPSHOT loads cleanly. Runs before React code.
(function(){
  var DEPLOY_VERSION = "v20260414_093634";
  var stored = localStorage.getItem("cleo_deploy_ver");
  if(stored !== DEPLOY_VERSION){
    console.log("🚀 New deploy detected ("+DEPLOY_VERSION+"). Clearing stale localStorage so fresh DATA_SNAPSHOT loads.");

    var apiKey = localStorage.getItem("cleo_api_key");

// Syncs cleo_cats to a private GitHub Gist for cross-device access.
// PAT is stored per-device in localStorage (never baked into HTML/public deploy).
// Default Gist ID (safe to bake, it's just an identifier):

  }
  // URL-HASH SETUP: open cleo-app/#pat=XXX&gist=YYY to auto-configure
  if(location.hash && location.hash.indexOf("pat=") > -1){
    try{
      var params = new URLSearchParams(location.hash.slice(1));
      var pat = params.get("pat");
      var gist = params.get("gist");
      if(pat) localStorage.setItem("cleo_gist_pat", pat);

    }catch(e){ console.warn("Hash setup failed:", e); }

window.CleoSync = (function(){
  var GIST_FILE = "cleo-data.json";
  var lastSaveTs = 0;
  var saveTimer = null;
  var lastSavedHash = "";

  function getPat(){ return localStorage.getItem("cleo_gist_pat") || ""; }
  function getGistId(){ return localStorage.getItem("cleo_gist_id") || ""; }
  function isConfigured(){ return !!getPat() && !!getGistId(); }

  async function pullFromGist(){
    if(!isConfigured()){ console.log("☁️ Gist sync: PAT not set, skipping pull"); return null; }
    try{
      const r = await fetch("https://api.github.com/gists/"+getGistId(), {
        headers: {
          "Authorization": "Bearer "+getPat(),
          "Accept": "application/vnd.github+json"
        }
      });
      if(!r.ok){ console.warn("☁️ Gist pull failed:", r.status, r.statusText); return null; }
      const data = await r.json();
      const file = data.files && data.files[GIST_FILE];
      if(!file){ console.log("☁️ Gist pull: file not found"); return null; }
      const content = file.content;
      if(!content || content === "{}"){ console.log("☁️ Gist pull: empty"); return null; }
      const parsed = JSON.parse(content);
      console.log("☁️ Gist pull OK:", Object.keys(parsed).length, "keys");
      return parsed;
    } catch(err){ console.warn("☁️ Gist pull error:", err); return null; }
  }

  async function pushToGist(payload){
    if(!isConfigured()){ return false; }
    try{
      const body = {
        files: {}
      };
      body.files[GIST_FILE] = { content: JSON.stringify(payload, null, 2) };
      const r = await fetch("https://api.github.com/gists/"+getGistId(), {
        method: "PATCH",
        headers: {
          "Authorization": "Bearer "+getPat(),
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });
      if(!r.ok){ console.warn("☁️ Gist push failed:", r.status, r.statusText); return false; }
      lastSaveTs = Date.now();
      console.log("☁️ Gist push OK at", new Date().toISOString());
      return true;
    } catch(err){ console.warn("☁️ Gist push error:", err); return false; }
  }

  // Debounced save: call on any change, actually fires 3s after last call
  function saveDebounced(payload){
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      const hash = JSON.stringify(payload).length + ":" + JSON.stringify(payload).slice(-50);
      if(hash === lastSavedHash){ console.log("☁️ Gist: no changes, skipping push"); return; }
      lastSavedHash = hash;
      pushToGist(payload);
    }, 3000);
  }

  // Initial pull on startup + merge into localStorage BEFORE React loads
  async function initialPull(){
    if(!isConfigured()){
      console.log("☁️ Gist sync not configured. Type SETUP_SYNC in chat to configure.");
      return;
    }
    const remote = await pullFromGist();
    if(!remote) return;
    // Merge: if remote has cleo_cats and it's different from local, use remote
    const remoteCats = remote.cleo_cats;
    if(remoteCats){
      const localCats = localStorage.getItem("cleo_cats");
      if(remoteCats !== localCats){
        console.log("☁️ Applying remote state from Gist (overrides local)");
        for(var k in remote){
          if(k !== "cleo_gist_pat" && k !== "cleo_gist_id" && k !== "cleo_deploy_ver"){
            localStorage.setItem(k, remote[k]);
          }
        }
        // Reload to show fresh data
        console.log("☁️ Reloading to apply pulled state...");
        location.reload();
      } else {
        console.log("☁️ Gist state matches local — no change");
      }
    }
  }

  // Setup UI: prompts user for PAT + Gist ID
  function setupPrompt(){
    var currentPat = getPat() ? "[PAT set]" : "[NOT SET]";
    var currentId = getGistId() || "[NOT SET]";
    var msg = "CLEO Gist Sync Setup\n\n"+
              "Current PAT: "+currentPat+"\n"+
              "Current Gist ID: "+currentId+"\n\n"+
              "1) Paste your GitHub Personal Access Token (PAT) with 'gist' scope:\n"+
              "   (Leave blank to keep existing)";
    var pat = prompt(msg);
    if(pat && pat.trim()){ localStorage.setItem("cleo_gist_pat", pat.trim()); }
    var gid = prompt("2) Paste your Gist ID (the hex string from the URL):\n(Leave blank to keep existing)");
    if(gid && gid.trim()){ localStorage.setItem("cleo_gist_id", gid.trim()); }
    if(isConfigured()){
      alert("✅ Sync configured!\n\nWill pull latest from Gist and reload...");
      initialPull();
    } else {
      alert("⚠️ Setup incomplete. Need both PAT and Gist ID.");
    }
  }

  return {
    pullFromGist: pullFromGist,
    pushToGist: pushToGist,
    saveDebounced: saveDebounced,
    initialPull: initialPull,
    setup: setupPrompt,
    isConfigured: isConfigured
  };
})();

// Global hotkey: Ctrl+Shift+S = setup sync

// Kick off initial pull when page loads (non-blocking)
window.addEventListener("DOMContentLoaded", function(){
  setTimeout(function(){ window.CleoSync.initialPull(); }, 500);
});

// ── LIVE SYNC: poll every 5s so changes from phone show up without clicks ──
(function(){
  var lastPullAt = 0;
  function doPoll(){
    if(!window.CleoSync || !window.CleoSync.isConfigured()) return;
    window.CleoSync.initialPull();
  }
  // Tab becomes visible → immediate pull
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState === "visible") doPoll();
  });
  window.addEventListener("focus", doPoll);
  // Poll every 5 seconds always (even when tab is in background)
  setInterval(doPoll, 5000);
  console.log("🔄 Live sync: polling every 5 seconds");
})();

// ── Firebase Storage — upload file, return download URL ──
async function storageUpload(fileKey, f) {
  if(!window.FB_STORAGE || !f.data) return null;
  try {
    const ref = window.FB_STORAGE.ref("cleo-files/" + fileKey);
    // Convert base64 data URL to blob
    const resp = await fetch(f.data);
    const blob = await resp.blob();
    await ref.put(blob, { contentType: f.type || "application/octet-stream" });
    const url = await ref.getDownloadURL();
    console.log("📎 Uploaded to Storage:", f.name);
    return url;
  } catch(e) {
    console.warn("❌ Storage upload failed:", f.name, e.message);
    return null;
  }
}

// ── Firebase Storage — delete file ──
async function storageDelete(fileKey) {
  if(!window.FB_STORAGE) return;
  try {
    await window.FB_STORAGE.ref("cleo-files/" + fileKey).delete();
    console.log("🗑 Deleted from Storage:", fileKey);
  } catch(e) { /* file may not exist, ok */ }
}

// ── Make a fileKey from item id + label ──
function makeFileKey(iid, label) {
  return (iid + "_" + label).replace(/[^a-zA-Z0-9_-]/g, "_").substring(0, 120);
}

// ── Strip base64 data from cats for Firestore main doc ──
function _stripFileData(cats) {
  return cats.map(c=>({...c,subs:c.subs.map(s=>({...s,items:s.items.map(i=>{
    if(!i.files||i.files.length===0) return i;
    return {...i, files: i.files.map(f=>{
      if(!f.data && !f.storageUrl) return f;
      const {data, ...rest} = f;
      return {...rest, hasData: true};
    })};
  })}))}));
}

// ── Upload all files with base64 data to Storage ──
function _uploadFilesToStorage(cats) {
  if(!window.FB_STORAGE) return;
  cats.forEach(c=>c.subs.forEach(s=>s.items.forEach(i=>{
    if(!i.files) return;
    i.files.forEach(f=>{
      if(!f.data || f.storageUrl) return; // skip if no data or already uploaded
      const fileKey = makeFileKey(i.id, f.label);
      storageUpload(fileKey, f).then(url=>{
        if(url) {
          f.storageUrl = url; // mutate in place for next save cycle
          console.log("📎 Storage URL saved for:", f.name);
        }
      });
    });
  })));
}

// ── Load files from Storage URLs into cats ──

  return cats;

let _fbFirstLoadDone = false; // BLOCK saves until Firebase has been read first
function fbSave(cats) {
  if(!FB_DOC) return;
  if(!_fbFirstLoadDone) { console.log("⏳ Waiting for Firebase first load before saving..."); return; }
  const id = Math.random().toString(36).slice(2);

    // Upload any new files to Storage
    _uploadFilesToStorage(cats);
    // Save cats WITHOUT base64 data to Firestore main doc
    const stripped = _stripFileData(cats);
    FB_DOC.set({ cats: JSON.stringify(stripped), _fbWriteId: id, ts: Date.now() })
      .catch(e => console.warn("Firebase save error:", e));
  }, 400);
}

         notes:"CONTACT\nBetty Lee — Office Manager, Chaton Enterprises (landlord)\nPhone: 604.322.1966 | Fax: 604.322.0969\nEmail: info@chatonenterprises.com\n\nINSURANCE BROKER\nMelvin Johal\nEmail: (from Outlook sent items)\nPolicy: 225 Marine\nLocation: 225 SE Marine Drive, Vancouver, BC V5X 2S4\n\nSITUATION\nAnnual building insurance renewal. Betty requires 3 documents: (1) City of Vancouver business license, (2) Province of BC business license, and (3) current insurance policy from broker Melvin @ TSN Insurance. Required every year for all recreational marijuana dispensaries.\n\nSTATUS\nPENDING — 2 of 3 files attached. Emailed Melvin Johal Apr 10 @ 1:59pm requesting 225 Marine insurance policy. Waiting for reply.\n\nNEXT STEPS\n1. ✅ City of Vancouver business license — DONE\n2. ✅ Province of BC business license — DONE\n3. ✅ Emailed Melvin Johal — requested 225 Marine insurance policy (Apr 10)\n4. Melvin sends policy → CLEO downloads + attaches\n5. All 3 files ready → CLEO drafts email to Betty Lee\n6. Joe reviews, approves, clicks send\n7. Confirm with Betty Lee that all documents received\n\nIF NO REPLY\nBetty Lee: 604.322.1966\nMelvin @ TSN Insurance: (add number) — this is blocking the renewal"},
        {id:52,text:"438 RICHARDS — Missed Rent Apr 1 (Anoop)",files:[],requiredFiles:[],priority:"high",done:false,status:"pending",loc:"438 Richards St",isEmail:true,deadline:"Apr 14",subject:"Update Regarding April Rent — 438 Richards",sender:"Anoop",senderEmail:"",dateReceived:"",

         chat:[{from:"joe",text:"i notice in my calendar this is for monday... can you move it to tuesday"},{from:"cleo",text:"Done. Moved the deadline and Google Calendar event to Tuesday Apr 14 at 9:30am. You will get a reminder 30 min before."}],
         drafts:{
           subject:"Update Regarding April Rent — 438 Richards",
           chosen:"v2",
           v1:"Hi Anoop,\n\nI wanted to reach out directly and be upfront with you about where things stand.\n\nWe are currently dealing with a situation with the BC Ministry of Finance that has temporarily restricted access to our operating account. This has put us in a difficult cash flow position, and as a result, we were unable to make our April 1 rent payment on time.\n\nWe are actively working with the appropriate parties to get this resolved as quickly as possible. This is a top priority for us.\n\nI did not want to leave you in the dark. As soon as we have clarity on the timeline, I will update you immediately.\n\nI appreciate your patience and understanding while we work through this.\n\nThank you,\nJoe Le\nCo-Founder, ARCannabis Store\n(778) 858-9591\njoe@arcannabis.ca",
           v2:"Hi Anoop,\n\nI am writing to give you an honest update on our situation at 438 Richards.\n\nDue to an ongoing matter with the BC Ministry of Finance, our business is in serious financial distress. As a result, we will not be able to continue with rent payments moving forward.\n\nI want to be upfront with you rather than let this situation drag on. Given where things stand, I believe it makes sense for us to work toward a clean and orderly transition of the unit so you can move forward as quickly as possible.\n\nI am open to discussing what that could look like and finding a reasonable solution for both sides.\n\nPlease let me know your thoughts.\n\nThank you,\nJoe Le",
           v1Label:"BALANCED — Joe's Tone",
           v2Label:"CLEAN EXIT — Mutual Transition",
           chat:[
             {from:"joe",text:"basically we need to exit cleanly with respects, we cant pay him anymore. not sure if we should tell him everything but he might sue, tony is on personal guarantee. we owe a lot of tax to the province and seriously facing bankruptcy. best to come up with a solution to exit cleanly. need help to come up with something proper to resolve this matter."},
             {from:"cleo",text:"Got it Joe. I rewrote V2 completely. Here's my approach: I kept it honest but strategic. We are NOT mentioning bankruptcy, tax debt, or Tony's personal guarantee. That's your leverage and legal position, not something to hand over in an email. Instead, the new draft focuses on: (1) being transparent about the financial difficulty, (2) showing respect by not going silent, (3) proposing a conversation about options like a payment plan or transition timeline. This positions you as someone trying to do the right thing, which makes it much harder for him to escalate aggressively. Read V2 above and let me know if you want changes."},
             {from:"joe",text:"i like version 2, remove the dashes"},
             {from:"cleo",text:"Done. Removed all the dashes and replaced them with natural sentence flow. Same message, cleaner read. Take a look."},
             {from:"joe",text:"we will be unable to pay rent going forward. looking at options to file for bankruptcy. need a clean way to tell him. a solution. dont want him to sue or come in aggressively."},
             {from:"cleo",text:"Rewrote V2 completely. Here is the strategy: NO mention of bankruptcy anywhere. Instead, the email tells him honestly that rent cannot continue, proposes a mutual lease surrender, and frames cooperation as his best outcome."},
             {from:"joe",text:"i like v2 but its too long and might piss him off. need to be more professional. we dont want issues. we are facing bankruptcy."},
             {from:"cleo",text:"Shortened it significantly. More professional, no fluff."},
             {from:"joe",text:"good but I rewrote it myself. removed the bankruptcy mention, kept it cleaner. just honest update, cant pay, lets transition cleanly."},
             {from:"cleo",text:"Your version is better. Straight to the point, professional, no oversharing. Locked it in as V2. Hit Use This Version when you are ready to send."}

           ]

pplication\n6. Gather all required documents for new site\n7. Submit DP application to City of Vancouver\n\nPHASE 3 \u2014 LAND-USE TRANSFER (AFTER NEW DP APPROVED)\n8. File appeal to transfer cannabis land-use from 1812 West 4th to new location\n9. Attend hearing / submit documentation\n10. Confirm transfer complete\n\nIF NO REPLY\nCall Louis Ng: 604-873-7723 | louis.ng@vancouver.ca"},{"id":3,"text":"CHATON ENTERPRISES \u2014 Building Insurance Renewal","priority":"high","done":false,"status":"done","loc":"202-7545 Cambie St","isEmail":true,"deadline":"","subject":"Annual Building Insurance Renewal \u2014 Documents Required","sender":"Betty Lee","senderEmail":"info@chatonenterprises.com","dateReceived":"Apr 10","files":[{"label":"Business License \u2014 City of Vancouver","name":"450229-3 (1).pdf","size":0},{"label":"Business License \u2014 Province of BC","name":"225 SE MARINE (1).pdf","size":0},{"label":"Insurance Policy \u2014 Melvin @ TSN Insurance (225)","name":"ARC225INSURANCEPOLICY.pdf","size":430739,"type":"application/pdf","data":"","ts":"2026-04-13T22:02:32.587Z"}],"requiredFiles":["Business License \u2014 City of Vancouver","Business License \u2014 Province of BC","Insurance Policy \u2014 Melvin @ TSN Insurance (225)"],"log":["Apr 10 \u2014 Email received from Betty Lee requesting business license + insurance cert","\u2705 Step 1: City of Vancouver business license \u2014 ATTACHED","\u2705 Step 2: Province of BC business license \u2014 ATTACHED","\u2705 Step 3: Apr 10 1:59pm \u2014 Joe emailed Melvin Johal requesting 225 Marine insurance policy","\u23f3 Step 4: Waiting on Melvin to send policy \u2192 CLEO attaches when received","\u23f3 Step 5: All 3 files ready \u2192 CLEO drafts email to Betty Lee","\u23f3 Step 6: Joe reviews + sends","Apr 13, 2026, 3:02 PM \u2014 \ud83d\udcce File attached: Insurance Policy \u2014 Melvin @ TSN Insurance (225)","Apr 13, 2026 \u2014 \u2713 Status \u2192 DONE"],"notes":"CONTACT\nBetty Lee \u2014 Office Manager, Chaton En ont want issues. we are facing bankruptcy."},{"from":"cleo","text":"Shortened it significantly. More professional, no fluff."},{"from":"joe","text":"good but I rewrote it myself. removed the bankruptcy mention, kept it cleaner. just honest update, cant pay, lets transition cleanly."},{"from":"cleo","text":"Your version is better. Straight to the point, professional, no oversharing. Locked it in as V2. Hit Use This Version when you are ready to send."}]},"notes":"CONTACT\nAnoop \u2014 Landlord, 438 Richards St\nPhone: (add number)\nEmail: (add email)\n\nSITUATION\nMissed April 1 rent payment for 438 Richards. BC Ministry of Finance has locked ARCannabis bank account due to outstanding PST tax issues. Cash flow is severely impacted. Need to notify Anoop professionally \u2014 maintain trust, show transparency.\n\nSTATUS\nTO DO \u2014 email not yet sent. Review drafts below.\n\nNEXT STEPS\n1. Joe reviews both email versions\n2. Joe picks a version or requests changes\n3. Joe sends the email\n4. CLEO moves status to PENDING automatically\n5. Follow up if no reply within 5 business days\n\nIF NO REPLY\nCall Anoop directly \u2014 do not go silent. Transparency builds trust."}]},{"id":"arc-fin","label":"Finance","icon":"\ud83d\udcb5","items":[]},{"id":"arc-mkt","label":"Marketing","icon":"\ud83d\udce3","items":[]},{"id":"arc-con","label":"Contacts","icon":"\ud83d\udcc7","items":[{"id":17,"text":"Louis Ng \u2014 City of Vancouver BOV","priority":"high","done":false,"loc":"City Hall Unit #112","notes":"Phone: 604-873-7723\nEmail: louis.ng@vancouver.ca\nRole: Board Secretary & FOI Officer"},{"id":18,"text":"Betty Lee \u2014 Chaton Enterprises (landlord)","priority":"medium","done":false,"loc":"202-7545 Cambie St","notes":"Phone: 604.322.1966\nFax: 604.322.0969"},{"id":19,"text":"Kimberly Li \u2014 City of Vancouver BL","priority":"high","done":false,"loc":"","notes":"Phone: 604.871.6091\nEmail: kimberly.li@vancouver.ca\nRole: Property Use Inspector"},{"id":20,"text":"Insurance /* END_DATA_SNAPSHOT */

function loadInitialCats(){
  // Priority: 1) localStorage (has live data + chat history), 2) DATA_SNAPSHOT (for fresh browsers), 3) INITIAL_CATS
  const saved = lsGet(LS_CATS, null);
  if(saved && Array.isArray(saved) && saved.length > 0) return saved;
  if(DATA_SNAPSHOT && Array.isArray(DATA_SNAPSHOT)) {
    lsSet(LS_CATS, DATA_SNAPSHOT);
    lsSet(LS_VER, CURRENT_VER);
    return DATA_SNAPSHOT;
  }
  lsSet(LS_VER, CURRENT_VER);
  lsSet(LS_CATS, INITIAL_CATS);
  lsSet(LS_ARCH, []);
  return INITIAL_CATS;
}

function fmtDeadline(d){ if(!d)return""; if(/\d{4}/.test(d))return d; return d+", "+new Date().getFullYear(); }

function App() {
  const [cats, setCats] = useState(()=>loadInitialCats());
  const [mainTab, setMainTab] = useState("per");
  const [subTabs, setSubTabs] = useState(()=>lsGet(LS_TABS,{arc:"arc-legal",pp:"pp-ops",amz:"amz-inv",per:"per-tasks"}));
  const [detail, setDetail] = useState(null);
  const [undoStack, setUndoStack] = useState([]);
  const [redoStack, setRedoStack] = useState([]);
  const [actionHistory, setActionHistory] = useState([]);
  const [archived, setArchived] = useState(()=>lsGet(LS_ARCH,[]));
  const [showArchive, setShowArchive] = useState(false);
  const [toast, setToast] = useState("");
  const [addText, setAddText] = useState({});
  const [syncMsg, setSyncMsg] = useState("");
  const [deadlinesOpen, setDeadlinesOpen] = useState(true);
  const [cleoMenuOpen, setCleoMenuOpen] = useState(false);

  /* ── Auto-save to localStorage + Firebase ── */
  useEffect(()=>{
    lsSet(LS_CATS, cats);
    fbSave(cats); // Firebase is disabled but keep call (no-op)
    // Cloud sync to Gist (debounced 3s)
    if(window.CleoSync && window.CleoSync.isConfigured()){
      var payload = {};
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k !== "cleo_gist_pat" && k !== "cleo_deploy_ver") payload[k] = localStorage.getItem(k);
      }
      window.CleoSync.saveDebounced(payload);
    }
  }, [cats]);
  /* ── Fallback: if Firebase never responds, allow saves after 3s ── */
  useEffect(()=>{ const t=setTimeout(()=>{ if(!_fbFirstLoadDone){ _fbFirstLoadDone=true; console.log("⚠️ Firebase timeout — allowing saves"); fbSave(cats); }}, 3000); return ()=>clearTimeout(t); }, []);

  /* ── Force upload local files to Firebase Storage on startup (runs once) ── */
  useEffect(()=>{
    const timer = setTimeout(()=>{
      if(!window.FB_STORAGE) return;
      let fileCount = 0;
      cats.forEach(c=>c.subs.forEach(s=>s.items.forEach(i=>{
        if(!i.files) return;
        i.files.forEach(f=>{
          if(!f.data || f.storageUrl) return; // skip if no data or already has URL
          fileCount++;
          const fk = makeFileKey(i.id, f.label);
          storageUpload(fk, f).then(url=>{
            if(url){
              setCats(prev=>prev.map(c2=>({...c2,subs:c2.subs.map(s2=>({...s2,items:s2.items.map(i2=>i2.id!==i.id?i2:{...i2,files:(i2.files||[]).map(f2=>f2.label===f.label?{...f2,storageUrl:url}:f2)})}))})));
            }
          });
        });
      })));
      if(fileCount > 0) console.log("🔄 Startup sync: uploading", fileCount, "files to Storage");
    }, 2000);
    return ()=>clearTimeout(timer);
  }, []);
  useEffect(()=>{ lsSet(LS_ARCH, archived); }, [archived]);
  useEffect(()=>{ lsSet(LS_TABS, subTabs); }, [subTabs]);

        {[{id:"tasks",l:"📋 Tasks"},{id:"plan",l:"⚡ Plan"},{id:"ai",l:"🧠 AI"},{id:"alerts",l:"🔔 Alerts"}].map(t=>{
          const isAlerts = t.id==="alerts";
          const urgentAlerts = isAlerts ? 0 : allItems.filter(i=>!i.done&&i.priority==="high"&&i.deadline).length;
          return (
          <button key={t.id} onClick={()=>setMainTab(t.id)}
            style={{flex:1,padding:"9px 4px",borderRadius:10,border:"none",background:mainTab===t.id?"#e6e0d5":"transparent",color:mainTab===t.id?"#111122":"#777066",fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"center",position:"relative"}}>
            {t.l}
            {t.id==="alerts"&&urgentAlerts>0&&<span style={{position:"absolute",top:4,right:4,background:"#ff4455",color:"#fff",fontSize:8,fontWeight:900,borderRadius:"50%",width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center"}}>{urgentAlerts}</span>}
          </button>
          );
        })}
      </div>

      {/* DEADLINE BANNER — collapsible */}
      {deadlinesWithContext.length>0&&(
        <div style={{background:"#fff0f2",border:"1px solid #ffcccc",borderRadius:14,padding:"10px 14px",margin:"6px 14px",flexShrink:0}}>
          <div onClick={()=>setDeadlinesOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none"}}>
            <span style={{fontSize:11,fontWeight:800,color:"#ff4455",letterSpacing:"0.08em",transition:"transform 0.2s",transform:deadlinesOpen?"rotate(90deg)":"rotate(0deg)",display:"inline-block"}}>▶</span>
            <span style={{fontSize:11,fontWeight:800,color:"#ff4455",letterSpacing:"0.08em"}}>DEADLINES</span>
            <span style={{background:"#ff4455",color:"#fff",fontSize:9,fontWeight:800,borderRadius:10,padding:"1px 7px",minWidth:14,textAlign:"center"}}>{deadlinesWithContext.length}</span>
          </div>
          {deadlinesOpen&&<div style={{marginTop:6}}>
            {deadlinesWithContext.map(i=>(
              <div key={i.id} onClick={()=>setDetail({item:i,cat:i._cat,sub:i._sub})} style={{display:"flex",alignItems:"center",gap:9,padding:"4px 0",fontSize:13,cursor:"pointer",borderRadius:8}} className="trow">
                <span style={{background:i._cat.color,color:"#fff",fontSize:10,fontWeight:800,padding:"3px 9px",borderRadius:20,flexShrink:0}}>{fmtDeadline(i.deadline)}</span>
                <span style={{color:"#333344",flex:1,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{i.text}</span>
                <span style={{color:i._cat.color,fontSize:11,flexShrink:0}}>→</span>
              </div>
            ))}
          </div>}
        </div>
      )}

      {/* NAV ROW 1 — Businesses */}
      <div style={{margin:"8px 14px 0",background:"#ffffff",border:"1px solid #ddd8cf",borderRadius:14,padding:"6px",flexShrink:0,boxShadow:"0 1px 4px #00000008"}}>
      <div className="cat-carousel" ref={catDrag.ref}
        onMouseDown={catDrag.start} onMouseLeave={catDrag.end} onMouseUp={catDrag.end} onMouseMove={catDrag.move}
        style={{display:"flex",gap:6,overflowX:"auto",flexShrink:0}}>
        {cats.map(c=>(
          <button key={c.id} className="pill" onClick={(e)=>{if(catDrag.state.current.moved){e.preventDefault();return;}setMainTab(c.id);}}
            style={{flexShrink:0,padding:"9px 16px",borderRadius:10,border:`2px solid ${mainTab===c.id?c.color+"80":"transparent"}`,background:mainTab===c.id?c.color+"18":"transparent",color:mainTab===c.id?c.color:"#665e52",fontSize:14,fontWeight:700,whiteSpace:"nowrap",letterSpacing:"0.01em",boxShadow:mainTab===c.id?`0 2px 8px ${c.color}20`:"none"}}>
            {c.icon} {c.label}
          </button>
        ))}
        <div style={{flexShrink:0,width:4}}/>
      </div>
      </div>

      {/* NAV ROW 2 — Sub tabs */}
      {curCat&&(
        <div style={{margin:"8px 14px 0",background:"#ffffff",border:"1px solid #ddd8cf",borderRadius:14,padding:"5px 6px",flexShrink:0,boxShadow:"0 1px 4px #00000008"}}>
        <div className="cat-carousel" ref={subDrag.ref}
          onMouseDown={subDrag.start} onMouseLeave={subDrag.end} onMouseUp={subDrag.end} onMouseMove={subDrag.move}
          style={{display:"flex",gap:5,overflowX:"auto",flexShrink:0}}>
          {curCat.subs.map(s=>(
            <button key={s.id} className="pill" onClick={(e)=>{if(subDrag.state.current.moved){e.preventDefault();return;}setSub(s.id);}}
              style={{flexShrink:0,padding:"5px 11px",borderRadius:10,border:`1px solid ${curSubId===s.id?curCat.color+"50":"transparent"}`,background:curSubId===s.id?curCat.color+"12":"transparent",color:curSubId===s.id?curCat.color:"#999088",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>
              {s.icon} {s.label}
            </button>
          ))}
          <div style={{flexShrink:0,width:4}}/>
        </div>
        </div>
      )}

      {/* MAIN CONTENT */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px 80px",marginTop:8}}>
        {mainTab==="tasks"&&<TasksOverview cats={cats} setMainTab={setMainTab} setSub={setSub} />}
        {mainTab==="plan"&&<PlanView cats={cats} />}
        {mainTab==="ai"&&<AIView cats={cats} />}
        {mainTab==="alerts"&&<AlertsView cats={cats} setMainTab={setMainTab} setDetail={setDetail} />}
        {curCat&&mainTab!=="tasks"&&mainTab!=="plan"&&mainTab!=="ai"&&curSub&&(
          <SubView cat={curCat} sub={curSub} onToggle={toggleItem} onDel={delItem} onAdd={addItem} addText={addText} setAddText={setAddText} onOpenDetail={setDetail} />
        )}
      </div>

      {/* BOTTOM QUICK ADD */}
      <QuickAdd cats={cats} setCats={setCats} snap={snap} setMainTab={setMainTab} setSubTabs={setSubTabs} showToast={showToast} uid={uid} currentTab={mainTab} currentSubTab={subTabs[mainTab]} />

      {/* DETAIL SHEET */}
      {detail&&(()=>{
        const liveCat=cats.find(c=>c.id===detail.cat.id);
        const liveSub=liveCat?.subs.find(s=>s.id===detail.sub.id);
        const liveItem=liveSub?.items.find(i=>i.id===detail.item.id);
        if(!liveCat||!liveSub||!liveItem) return null;
        return <DetailSheet item={{item:liveItem,cat:liveCat,sub:liveSub}} cats={cats} onClose={()=>setDetail(null)} onToggle={toggleItem} onSetStatus={setStatus} onAddLog={addLog}
          onEditTitle={(cid,sid,iid,val)=>{ snap("✏️ Renamed: "+val.slice(0,25)); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,text:val})})})); }}
          onEditNotes={(cid,sid,iid,val)=>{ snap("📝 Notes edited"); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,notes:val})})})); }}
          onAttachFile={(cid,sid,iid,file)=>{ const nowFull=new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true}); const fileWithTs={...file,ts:new Date().toISOString()}; snap("📎 File attached"); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,files:[...(i.files||[]),fileWithTs],log:[...(i.log||[]),nowFull+" — 📎 File attached: "+file.label]})})}));
            /* Instant upload to Firebase Storage */
            if(file.data && window.FB_STORAGE){
              const fk=makeFileKey(iid,file.label);
              storageUpload(fk,fileWithTs).then(url=>{
                if(url){
                  setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,files:(i.files||[]).map(f=>f.label===file.label?{...f,storageUrl:url}:f)})})}));
                  console.log("📎 Storage URL set for:", file.label);
                }
              });
            }
          }}
          onDownloadFile={(fileObj)=>{
            if(fileObj.data){
              const link=document.createElement("a");
              link.href=fileObj.data;
              link.download=fileObj.name;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
            } else if(fileObj.storageUrl){
              window.open(fileObj.storageUrl,"_blank");
            }
          }}
          onRemoveFile={(cid,sid,iid,label)=>{ const nowFull=new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true}); snap("🗑 File removed"); const fileKey=makeFileKey(iid,label); storageDelete(fileKey); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,files:(i.files||[]).filter(f=>f.label!==label),log:[...(i.log||[]),nowFull+" — 🗑 File removed: "+label]})})})); }}
          onChooseDraft={(cid,sid,iid,drafts)=>{ snap("📄 Draft updated"); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,drafts})})})); }}
          onChatMsg={(cid,sid,iid,msgs)=>{ setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>i.id!==iid?i:{...i,chat:msgs})})})); }}
          onBatchUpdate={(cid,sid,iid,updates)=>{ snap("🔄 Task updated"); const now=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); setCats(prev=>prev.map(c=>c.id!==cid?c:{...c,subs:c.subs.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>{if(i.id!==iid)return i; const u={...i}; if(updates.notes!==undefined)u.notes=updates.notes; if(updates.status)u.status=updates.status; if(updates.deadline)u.deadline=updates.deadline; if(updates.priority)u.priority=updates.priority; if(updates.logs)u.log=[...(u.log||[]),...updates.logs.map(l=>`${now} — ${l}`)]; return u;})})})); }}
          onDelete={delItem}
        />;
      })()}

      {/* ARCHIVE MODAL — Done & Deleted, grouped by category */}
      {showArchive&&(()=>{
        const doneItems=archived.filter(a=>a._type==="done");
        const deletedItems=archived.filter(a=>a._type!=="done");
        const archTab=showArchive; /* "done" or "deleted" or true (default to done) */
        const activeTab=(showArchive==="deleted")?"deleted":"done";
        const items=activeTab==="done"?doneItems:deletedItems;
        /* Group by category */
        const grouped={};
        items.forEach(a=>{
          const key=a._deletedFrom?.catId||"other";
          if(!grouped[key])grouped[key]={label:a._deletedFrom?.catLabel||"Other",color:a._deletedFrom?.catColor||"#999",icon:a._deletedFrom?.catIcon||"📋",items:[]};
          grouped[key].items.push(a);
        });
        return (
        <div style={{position:"fixed",inset:0,background:"#eee9e0",zIndex:200,display:"flex",flexDirection:"column"}}>
          <div style={{background:"#ffffff",width:"100%",height:"100%",display:"flex",flexDirection:"column"}}>
            <div style={{display:"none"}}/>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"13px 16px",borderBottom:"1px solid #00000010"}}>
              <button onClick={()=>setShowArchive(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#777066",fontSize:18,lineHeight:1,padding:"4px",flexShrink:0}}>←</button>
              <div style={{fontSize:14,fontWeight:800,color:"#111122",flex:1}}>🗂 Archive</div>
              <button onClick={()=>setShowArchive(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#777066",fontSize:22,lineHeight:1}}>×</button>
            </div>
            {/* Tabs: Done / Deleted */}
            <div style={{display:"flex",gap:4,padding:"8px 16px",borderBottom:"1px solid #00000008"}}>
              <button onClick={()=>setShowArchive("done")}
                style={{flex:1,padding:"8px",borderRadius:10,border:"none",background:activeTab==="done"?"#0a7a5015":"transparent",color:activeTab==="done"?"#0a7a50":"#999088",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                ✅ Completed ({doneItems.length})
              </button>
              <button onClick={()=>setShowArchive("deleted")}
                style={{flex:1,padding:"8px",borderRadius:10,border:"none",background:activeTab==="deleted"?"#ff445515":"transparent",color:activeTab==="deleted"?"#ff4455":"#999088",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                🗑 Deleted ({deletedItems.length})
              </button>
            </div>
            <div style={{overflowY:"auto",padding:"12px 16px"}}>
              {items.length===0&&<div style={{color:"#b5ac9e",fontSize:12,textAlign:"center",padding:"30px 0"}}>{activeTab==="done"?"No completed tasks yet":"No deleted tasks"}</div>}
              {Object.entries(grouped).map(([catId,group])=>(
                <div key={catId} style={{marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,padding:"4px 0"}}>
                    <span style={{fontSize:14}}>{group.icon}</span>
                    <span style={{fontSize:11,fontWeight:800,color:group.color,letterSpacing:"0.05em"}}>{group.label.toUpperCase()}</span>
                    <span style={{fontSize:10,color:"#b5ac9e"}}>({group.items.length})</span>
                  </div>
                  {group.items.map((a,i)=>(
                    <div key={a.id+"-"+i} style={{background:"#f5f1ea",border:"1px solid #ddd8cf",borderRadius:10,padding:"10px 12px",marginBottom:6,marginLeft:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#333344",flex:1}}>{a.text}</span>
                        {a.deadline&&<span style={{background:group.color,color:"#fff",fontSize:8,fontWeight:800,padding:"2px 6px",borderRadius:20}}>{a.deadline}</span>}
                      </div>
                      <div style={{fontSize:10,color:"#999088",marginBottom:8}}>
                        {a._deletedFrom.subLabel} · {activeTab==="done"?"Completed":"Deleted"} {a._deletedAt}
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>{restoreItem(a);const remaining=archived.filter(x=>x.id!==a.id);if(remaining.length===0)setShowArchive(false);}}
                          style={{background:activeTab==="done"?"#0a7a50":"#665e52",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:11,padding:"6px 14px",cursor:"pointer"}}>
                          ↩ {activeTab==="done"?"Reopen":"Restore"}
                        </button>
                        <button onClick={()=>{setArchived(prev=>prev.filter(x=>x.id!==a.id));const remaining=archived.filter(x=>x.id!==a.id);if(remaining.length===0)setShowArchive(false);showToast("Permanently deleted");}}
                          style={{background:"none",border:"1px solid #ff445530",borderRadius:8,color:"#ff4455",fontWeight:700,fontSize:11,padding:"6px 14px",cursor:"pointer"}}>
                          🗑 Delete Forever
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </div>
        );
      })()}

      {/* TOAST */}
      {toast&&<div style={{position:"absolute",bottom:72,left:"50%",transform:"translateX(-50%)",background:"#e6e0d5",border:"1px solid #00000020",color:"#111122",padding:"8px 18px",borderRadius:20,fontSize:12,zIndex:999,whiteSpace:"nowrap",pointerEvents:"none"}}>{toast}</div>}
    </div>
    </div>
  );
}

function TasksOverview({cats,setMainTab,setSub}){
  return (
    <div>
      {cats.map(c=>{
        const items=c.subs.flatMap(s=>s.items);
        const done=items.filter(i=>i.done).length;
        const urgent=items.filter(i=>!i.done&&i.priority==="high").slice(0,3);
        const pct=items.length?Math.round(done/items.length*100):0;
        return (
          <div key={c.id} style={{background:"#ffffff",border:`1px solid ${c.color}20`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
            <button onClick={()=>setMainTab(c.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"12px 14px",background:"none",border:"none",color:"#111122",cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:18}}>{c.icon}</span>
              <span style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:800,color:c.color,flex:1}}>{c.label.toUpperCase()}</span>
              <div style={{width:50,height:3,background:"#00000012",borderRadius:10,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:c.color,transition:"width .4s"}}/>
              </div>
              <span style={{fontSize:10,color:"#999088",margin:"0 4px"}}>{done}/{items.length}</span>
              <span style={{fontSize:10,color:c.color}}>→</span>
            </button>
            {urgent.length>0&&(
              <div style={{borderTop:`1px solid #0000000a`,padding:"6px 14px 10px"}}>
                {urgent.map(i=>(
                  <div key={i.id} style={{display:"flex",alignItems:"center",gap:7,padding:"3px 0",fontSize:12}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:"#ff4455",flexShrink:0}}/>
                    <span style={{flex:1,color:"#333344",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.text}</span>
                    {i.deadline&&<span style={{background:"#d50000",color:"#fff",fontSize:8,fontWeight:800,padding:"1px 5px",borderRadius:20}}>{fmtDeadline(i.deadline)}</span>}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function SubView({cat,sub,onToggle,onDel,onAdd,addText,setAddText,onOpenDetail}){
  const key=`${cat.id}-${sub.id}`;
  const done=sub.items.filter(i=>i.done).length;
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 2px 10px"}}>
        <div style={{fontSize:12,color:cat.color,fontWeight:700}}>{sub.icon} {sub.label}</div>
        <div style={{fontSize:10,color:"#999088"}}>{done}/{sub.items.length} done</div>
      </div>
      <div style={{background:"#ffffff",border:`1px solid ${cat.color}18`,borderRadius:14,overflow:"hidden",marginBottom:10}}>
        {sub.items.length===0&&<div style={{padding:20,textAlign:"center",color:"#b5ac9e",fontSize:12}}>Nothing here yet — add below</div>}
        {sub.items.map(i=>i.isEmail
          ? <EmailCard key={i.id} item={i} cat={cat} sub={sub} onToggle={onToggle} onDel={onDel} onOpen={onOpenDetail}/>
          : <TaskRow key={i.id} item={i} cat={cat} sub={sub} onToggle={onToggle} onDel={onDel} onOpen={onOpenDetail}/>
        )}
        <div style={{display:"flex",gap:6,padding:"8px 10px",borderTop:"1px solid #0000000a"}}>
          <input value={addText[key]||""} onChange={e=>setAddText(t=>({...t,[key]:e.target.value}))}
            onKeyDown={e=>e.key==="Enter"&&onAdd(cat.id,sub.id)}
            placeholder="Add task... (!high urgent, @Location)"
            style={{flex:1,background:"#00000007",border:"1px solid #00000010",borderRadius:9,padding:"8px 11px",color:"#111122",fontSize:12,outline:"none"}}/>
          <button onClick={()=>onAdd(cat.id,sub.id)} style={{width:34,background:cat.color,border:"none",borderRadius:9,color:"#fff",fontSize:18,fontWeight:900,cursor:"pointer"}}>+</button>
        </div>
      </div>
    </div>
  );
}

function TaskRow({item,cat,sub,onToggle,onDel,onOpen}){
  const p=PRI[item.priority];
  const st=safeStatus(item.status||"todo");
  /* Extract steps: numbered (1. 2.) or bullets (• ✅) */
  const steps=(item.notes||"").split("\n").filter(l=>/^\d+\.\s|^\s*[•·\-]\s|^\s*✅\s/.test(l.trim())).slice(0,4);
  const hasSteps=steps.length>0;
  const hasRichContent=hasSteps||item.deadline||item.status;

  if(!hasRichContent){
    /* Simple row for basic tasks */
    return (
      <div className="trow" style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:"1px solid #00000008",opacity:item.done?0.4:1,cursor:"pointer"}} onClick={()=>onOpen({item,cat,sub})}>
        <button onClick={e=>{e.stopPropagation();onToggle(cat.id,sub.id,item.id);}}
          style={{width:20,height:20,borderRadius:6,border:item.done?"none":"1.5px solid #00000035",background:item.done?"#2effa8":"none",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"#08080f"}}>
          {item.done?"✓":""}
        </button>
        <span style={{flex:1,fontSize:12,textDecoration:item.done?"line-through":"none",color:"#111122"}}>{item.text}</span>
        <span style={{background:p.bg,color:p.color,fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:20,letterSpacing:"0.05em",flexShrink:0}}>{p.label}</span>
        <button className="delbtn" onClick={e=>{e.stopPropagation();onDel(cat.id,sub.id,item.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc5b8",fontSize:15,padding:"0 2px",lineHeight:1}}>×</button>
      </div>
    );
  }

  /* Rich card for tasks with steps/deadline/status */
  return (
    <div className="tcard" style={{margin:"8px 10px 4px",background:"#ece7de",borderRadius:12,overflow:"hidden",border:`1px solid ${cat.color}25`,cursor:"pointer"}} onClick={()=>onOpen({item,cat,sub})}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px"}}>
        <span style={{flex:1,fontSize:12,fontWeight:700,color:"#111122",lineHeight:1.35}}>{item.text}</span>
        {item.deadline&&<span style={{background:"#d50000",color:"#fff",fontSize:8,fontWeight:800,padding:"2px 6px",borderRadius:20,flexShrink:0}}>{fmtDeadline(item.deadline)}</span>}
        <span style={{background:p.bg,color:p.color,fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:20,letterSpacing:"0.05em",flexShrink:0}}>{p.label}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"0 12px 8px"}}>
        <span style={{background:st.bg,color:st.color,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,letterSpacing:"0.05em"}}>{st.icon} {st.label}</span>
        {item.log&&item.log.length>0&&<span style={{fontSize:10,color:"#999088",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Latest: {item.log[item.log.length-1]}</span>}
      </div>

function DetailSheet({item:di,cats,onClose,onToggle,onSetStatus,onAddLog,onEditTitle,onEditNotes,onAttachFile,onRemoveFile,onDownloadFile,onChooseDraft,onChatMsg,onBatchUpdate,onDelete}){
  const {item,cat,sub}=di;
  const p=PRI[item.priority];
  const [editingTitle,setEditingTitle]=useState(false);
  const [notesOpen,setNotesOpen]=useState(true);
  const [logOpen,setLogOpen]=useState(false);
  const [titleVal,setTitleVal]=useState(item.text);
  const [draftFeedback,setDraftFeedback]=useState("");
  const [editingDraft,setEditingDraft]=useState(null);
  const [focusedDraft,setFocusedDraft]=useState(null);
  const [feedbackHistory,setFeedbackHistory]=useState([]);
  const [taskChat,setTaskChat]=useState("");
  const [chatLoading,setChatLoading]=useState(false);
  const [lightboxFile,setLightboxFile]=useState(null);
  const chatEndRef=useRef(null);
  const chatTARef=useRef(null);
  const pendingCursor=useRef(null);
  useEffect(()=>{setTitleVal(item.text);},[item.text]);
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[item.chat,chatLoading]);
  useEffect(()=>{if(pendingCursor.current!==null&&chatTARef.current){chatTARef.current.selectionStart=chatTARef.current.selectionEnd=pendingCursor.current;pendingCursor.current=null;}},[taskChat]);

  async function sendChatMsg(){
    const msg=taskChat.trim(); if(!msg||chatLoading) return;
    // ── FULL LOCALSTORAGE EXPORT ──
    if(msg==="EXPORT_LOCALSTORAGE"){
      setTaskChat("");
      const dump={};
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        dump[k]=localStorage.getItem(k);
      }
      const blob=new Blob([JSON.stringify(dump,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download="cleo-full-backup-"+Date.now()+".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      alert("✅ Full localStorage dumped! Check your Downloads folder.");
      return;
    }
    setTaskChat("");
    const prevChat=item.chat||[];
    const newChat=[...prevChat,{from:"joe",text:msg,ts:new Date().toISOString()}];
    onChatMsg(cat.id,sub.id,item.id,newChat);
    const shortMsg=msg.length>60?msg.slice(0,60)+"…":msg;
    onAddLog(cat.id,sub.id,item.id,`💬 Joe: ${shortMsg}`);

    const key=lsGet(LS_KEY,"") || DEFAULT_KEY;
    if(!key){
      const cleoReply=[...newChat,{from:"cleo",text:"Got it — saved your update. I'll process this when you sync with Cowork. 💬",ts:new Date().toISOString()}];
      onChatMsg(cat.id,sub.id,item.id,cleoReply);
      return;
    }
    setChatLoading(true);
    const hdrs={"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    try{
      const taskCtx=`Task: ${item.text}\nCategory: ${cat.label} > ${sub.label}\nPriority: ${item.priority}\nStatus: ${item.status||"todo"}\nDeadline: ${item.deadline||"none"}\nLocation: ${item.loc||"none"}`;
      const chatHistory=newChat.map(m=>({role:m.from==="joe"?"user":"assistant",content:m.text}));

      /* ── STEP 1: Chat reply ── */
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:hdrs,
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:600,
          system:`You are CLEO, Joe's AI executive assistant. You help manage tasks across his businesses (ARCannabis, Paper Pals, Amazon Seller, Personal). Today: ${new Date().toDateString()}.\n\nCurrent task context:\n${taskCtx}\nCurrent notes:\n${item.notes||"(none)"}\n\nRULES:\n- Be concise, warm, actionable. 2-4 sentences max.\n- When Joe asks to update something, CONFIRM what you changed (deadline, status, reminder, notes).\n- If Joe mentions a date/deadline, confirm the exact date.\n- If Joe says something is done, confirm you're marking it done.\n- If Joe mentions a person or contact, acknowledge you're saving it.\n- Always end with what happens next or what Joe needs to do.\n- Never say "I can't do that" — you update everything.`,
          messages:chatHistory
        })
      });
      const d=await r.json();
      if(d.error){
        if(d.error.type==="authentication_error"){lsSet(LS_KEY,"");onChatMsg(cat.id,sub.id,item.id,[...newChat,{from:"cleo",text:"API key invalid. Try sending another message and I'll ask for a new key.",ts:new Date().toISOString()}]);}
        else{onChatMsg(cat.id,sub.id,item.id,[...newChat,{from:"cleo",text:"Error: "+(d.error.message||"Something went wrong. Try again."),ts:new Date().toISOString()}]);}
        setChatLoading(false);return;
      }
      const reply=d.content?.find(b=>b.type==="text")?.text||"Hmm, I didn't get a response. Try again.";
      const finalChat=[...newChat,{from:"cleo",text:reply,ts:new Date().toISOString()}];
      onChatMsg(cat.id,sub.id,item.id,finalChat);

      /* ── STEP 2: Auto-rebuild notes + extract structured updates ── */
      const allMsgs=finalChat.map(m=>`${m.from==="joe"?"Joe":"CLEO"}: ${m.text}`).join("\n");
      const r2=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:hdrs,
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1500,
          system:`You are CLEO's backend processor. Based on the chat conversation, you MUST return a JSON object with these fields. Return ONLY valid JSON, nothing else.

{
  "notes": "Structured notes for this task (see format below)",
  "status": "todo|inprog|pending|done or null if no change",
  "deadline": "Short date like 'Apr 15' or null if no change",
  "logs": ["Array of new activity log entries describing what changed"],
  "priority": "high|medium|low or null if no change"
}

NOTES FORMAT — use ONLY sections that apply:

CONTACT
[Name, role, phone, email]

SITUATION
[What is happening, why it matters]

STATUS
[Current state — be specific about what's done and what's pending]

NEXT STEPS
• [Bullet list — use • for incomplete, ✅ for done steps]

DEADLINE
[Date and what it means]

IF NO REPLY
[Escalation plan]

RULES:
- Keep Joe's facts from existing notes — don't drop info the chat didn't contradict
- Clean up language but keep Joe's tone — professional, not stiff
- Do NOT invent information
- For "logs": summarize what CLEO just did (e.g. "Updated deadline to Apr 15", "Status → IN PROGRESS", "Updated notes with new contact info"). Always include at least one log entry.
- For "status": if Joe says something is done → "done". If work is happening → "inprog". If waiting on someone → "pending". If no signal → null.
- For "deadline": only set if Joe explicitly mentions a date. Format as "Mon DD" (e.g. "Apr 15"). null if no change.
- For "priority": only change if Joe explicitly says urgent/high/low. null if no change.`,
          messages:[{role:"user",content:`Task: ${item.text}\nCategory: ${cat.label} > ${sub.label}\nCurrent status: ${item.status||"todo"}\nCurrent deadline: ${item.deadline||"none"}\nCurrent priority: ${item.priority}\n\nExisting notes:\n${item.notes||"(none)"}\n\nFull chat history:\n${allMsgs}`}]
        })
      });
      const d2=await r2.json();
      if(!d2.error){
        const raw=d2.content?.find(b=>b.type==="text")?.text||"";
        try{
          /* Parse JSON — handle markdown code fences if present */
          const cleaned=raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
          const parsed=JSON.parse(cleaned);
          const updates={};
          if(parsed.notes&&parsed.notes.trim()) updates.notes=parsed.notes.trim();
          if(parsed.status&&["todo","inprog","pending","done"].includes(parsed.status)) updates.status=parsed.status;
          if(parsed.deadline) updates.deadline=parsed.deadline;
          if(parsed.priority&&["high","medium","low"].includes(parsed.priority)) updates.priority=parsed.priority;
          const logs=parsed.logs||[];
          /* Add CLEO reply summary to log */
          const replyShort=reply.length>60?reply.slice(0,60)+"…":reply;
          logs.push(`🤖 CLEO: ${replyShort}`);
          updates.logs=logs;
          onBatchUpdate(cat.id,sub.id,item.id,updates);
        }catch(e2){
          /* JSON parse failed — fall back to just updating notes as raw text */
          if(raw.trim()) onEditNotes(cat.id,sub.id,item.id,raw.trim());
        }
      }
    }catch(e){
      onChatMsg(cat.id,sub.id,item.id,[...newChat,{from:"cleo",text:"Connection error — check your internet and try again.",ts:new Date().toISOString()}]);
    }
    setChatLoading(false);
  }

  function saveTitle(){const v=titleVal.trim();if(v&&v!==item.text){onEditTitle(cat.id,sub.id,item.id,v);}setEditingTitle(false);}
  return (<>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#ffffff",width:"100%",maxWidth:480,maxHeight:"90vh",borderRadius:20,display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.18)",overflow:"hidden"}}>
        <div style={{display:"none"}}/>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"13px 16px",borderBottom:"1px solid #00000010"}}>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#777066",fontSize:18,lineHeight:1,padding:"4px",flexShrink:0}}>←</button>
          <span style={{fontSize:18}}>{item.done?"✅":item.priority==="high"?"🔴":item.priority==="medium"?"🟡":"🔵"}</span>
          <div style={{flex:1}}>
            {editingTitle===true
              ?<input value={titleVal} onChange={e=>setTitleVal(e.target.value)} onBlur={saveTitle} onKeyDown={e=>{if(e.key==="Enter")saveTitle();if(e.key==="Escape"){setTitleVal(item.text);setEditingTitle(false);}}} autoFocus
                style={{fontSize:13,fontWeight:700,lineHeight:1.35,width:"100%",background:"#f5f1ea",border:"1px solid #ccccdd",borderRadius:6,padding:"4px 8px",color:"#111122",outline:"none"}}/>
              :<div onClick={()=>setEditingTitle(true)} style={{fontSize:13,fontWeight:700,lineHeight:1.35,cursor:"text",borderBottom:"1px dashed #ccccdd",paddingBottom:2}} title="Click to edit">{item.text}</div>
            }
            <div style={{fontSize:10,color:"#999088",marginTop:2}}>{cat.label} → {sub.label} · {p.label} priority</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#777066",fontSize:22,lineHeight:1,flexShrink:0}}>×</button>
        </div>
        <div style={{overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
          {item.deadline&&<div>
            <div style={{fontSize:9,color:"#999088",letterSpacing:"0.08em",marginBottom:4}}>⏰ DEADLINE</div>
            <div style={{background:"#ff445510",border:"1px solid #ff445530",borderRadius:10,padding:"9px 12px",color:"#ff4455",fontSize:14,fontWeight:700}}>{fmtDeadline(item.deadline)}</div>
          </div>}
          {<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <div onClick={()=>setNotesOpen(!notesOpen)} style={{fontSize:9,color:"#999088",letterSpacing:"0.08em",cursor:"pointer",userSelect:"none"}}>{notesOpen?"▼":"▶"} 📝 NOTES & DETAILS</div>
              {notesOpen&&<button onClick={()=>setEditingTitle(prev=>prev==="notes"?false:"notes")} style={{background:"none",border:"1px solid #ccccdd",borderRadius:6,color:"#999088",fontSize:10,padding:"2px 8px",cursor:"pointer"}}>{editingTitle==="notes"?"Done":"✏️ Edit"}</button>}
            </div>
            {notesOpen&&editingTitle==="notes"
              ?<textarea value={item.notes||""} onChange={e=>onEditNotes(cat.id,sub.id,item.id,e.target.value)}
                placeholder="Type your notes here..."
                autoFocus
                style={{width:"100%",background:"#ece7de",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#333344",lineHeight:1.7,border:"1px solid #ddd8cf",outline:"none",resize:"vertical",minHeight:400,fontFamily:"inherit"}}/>
              :notesOpen?<div onClick={()=>{if(!item.notes)setEditingTitle("notes");}} style={{background:"#ece7de",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#333344",lineHeight:1.7,minHeight:60}}>
                {item.notes?item.notes.split("\n").map((line,i)=>{
                  const clean = line.replace(/^\*\*(.+?)\*\*$/, "$1").trim();
                  const isHeader = /^(CONTACT|SITUATION|STATUS|NEXT STEPS|IF NO REPLY\b.*|EMAIL DRAFT|ACTION ITEMS|TASK SUMMARY|TASK|BUSINESS|LOCATION|STEPS TO COMPLETE|NEXT STEP|INSURANCE BROKER|EMAIL SENT\b.*|PHASE \d.*|DEADLINE|PRIORITY|NOTES|New task):?\s*$/i.test(clean);
                  const isBullet = /^[•·\-]\s/.test(clean);
                  const isChecked = /^✅\s/.test(clean);
                  const isDone = isChecked || /^[\d]+\.\s*✅/.test(clean);
                  const isWaiting = /^[\d]+\.\s*⏳/.test(clean) || clean.startsWith("⏳");
                  const toggleStep = ()=>{
                    if(!isBullet && !isChecked) return;
                    const lines = item.notes.split("\n");
                    const stepText = bulletText.length>50 ? bulletText.slice(0,50)+"…" : bulletText;
                    const logs = [];
                    let newStatus = null;
                    if(isChecked){
                      lines[i] = lines[i].replace(/✅\s*/, "• ");
                      logs.push(`↩️ Reopened: ${stepText}`);
                      /* If unchecking, move back to in-progress */
                      if((item.status||"todo")==="done") newStatus="inprog";
                    } else {
                      lines[i] = lines[i].replace(/^(\s*)[•·\-]\s*/, "$1✅ ");
                      logs.push(`✅ Done: ${stepText}`);
                      /* Check if ALL bullets are now done */
                      const updatedNotes = lines.join("\n");
                      const allBullets = updatedNotes.split("\n").filter(l=>/^\s*[•·\-]\s|^\s*✅\s/.test(l));
                      const allDone = allBullets.length>0 && allBullets.every(l=>/^\s*✅/.test(l));
                      if(allDone){
                        newStatus="done";
                        logs.push("🎉 All steps complete — marked DONE");
                      } else if((item.status||"todo")==="todo"){
                        newStatus="inprog";
                        logs.push("◑ Auto → IN PROGRESS");
                      }
                    }
                    const update = {notes:lines.join("\n"), logs};
                    if(newStatus) update.status=newStatus;
                    onBatchUpdate(cat.id, sub.id, item.id, update);
                  };
                  const bulletText = isBullet ? clean.replace(/^[•·\-]\s*/, "") : isChecked ? clean.replace(/^✅\s*/, "") : clean;
                  if(isBullet || isChecked) return <div key={i} onClick={toggleStep} style={{
                    display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer",
                    padding:"4px 0",marginLeft:4,
                    opacity: isChecked ? 0.5 : 1,
                    transition:"all 0.2s",
                  }}>
                    <span style={{fontSize:14,lineHeight:"18px",flexShrink:0,marginTop:1}}>{isChecked?"✅":"◻️"}</span>
                    <span style={{fontSize:12,lineHeight:1.6,color:isChecked?"#0a7a50":"#333344",
                      textDecoration:isChecked?"line-through":"none"}}>{bulletText}</span>
                  </div>;
                  return <div key={i} style={{
                    fontWeight: isHeader ? 800 : 400,
                    fontSize: isHeader ? 11 : 12,
                    color: isHeader ? "#111122" : isDone ? "#0a7a50" : isWaiting ? "#7a5500" : "#333344",
                    letterSpacing: isHeader ? "0.08em" : "normal",
                    textTransform: isHeader ? "uppercase" : "none",
                    marginTop: isHeader ? 12 : 0,
                    marginBottom: isHeader ? 4 : 0,
                    borderTop: isHeader && i>0 ? "1px solid #00000010" : "none",
                    paddingTop: isHeader && i>0 ? 8 : 0,
                  }}>{clean || "\u00a0"}</div>
                }):<div style={{color:"#b5ac9e",fontStyle:"italic"}}>Tap Edit to add notes...</div>}
              </div>:null
            }
          </div>}
          {item.loc&&<div>
            <div style={{fontSize:9,color:"#999088",letterSpacing:"0.08em",marginBottom:4}}>📍 LOCATION</div>
            <div style={{background:"#ece7de",border:"1px solid #00000010",borderRadius:10,padding:"9px 12px",fontSize:13,color:"#333344"}}>{item.loc}</div>
          </div>}
          {/* FILES SECTION */}
          <div>
            <div style={{fontSize:9,color:"#999088",letterSpacing:"0.08em",marginBottom:6}}>📎 FILES</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {(item.requiredFiles||[]).map((req,i)=>{
                const attached=(item.files||[]).find(f=>f.label===req);
                return (
                  <div key={i} onClick={()=>{if(attached)setLightboxFile(attached);}} style={{borderRadius:10,border:`2px solid ${attached?"#2effa8":"#ddd8cf"}`,background:attached?"#e8fff5":"#fafafa",padding:"10px 12px",cursor:attached?"pointer":"default"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:16}}>{attached?"✅":"📋"}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#333344"}}>{req}</div>
                        {attached&&<div style={{fontSize:11,color:"#0a7a50",marginTop:2,fontWeight:600}}>📎 {attached.name}</div>}
                        {!attached&&<div style={{fontSize:10,color:"#b5ac9e",marginTop:1}}>No file attached yet</div>}
                      </div>
                      {attached
                        ?<button onClick={e=>{e.stopPropagation();onRemoveFile(cat.id,sub.id,item.id,req);}}
                           style={{background:"#ff445515",border:"1px solid #ff445540",borderRadius:20,color:"#ff4455",fontSize:12,fontWeight:700,width:28,height:28,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                        :<label style={{background:"#111122",color:"#fff",fontSize:11,fontWeight:700,padding:"6px 14px",borderRadius:20,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
                           + Attach
                           <input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style={{display:"none"}} onChange={e=>{

                  if(e.key==="."&&!e.shiftKey){

                    const lines=before.split("\n");
                    const last=lines[lines.length-1];
                    if(/^\d+\.$/.test(last.trim())){
                      e.preventDefault();
                      const nv=ta.value.substring(0,pos)+". "+ta.value.substring(pos);
                      pendingCursor.current=pos+2;

                    const v=ta.value;
                    const textBefore=v.substring(0,pos);
                    const lines=textBefore.split("\n");
                    const curLine=lines[lines.length-1];
                    const numMatch=curLine.match(/^(\d+)\.\s/);
                    if(numMatch&&curLine.trim().length>numMatch[0].length-1){
                      e.preventDefault();
                      const nextNum=parseInt(numMatch[1])+1;
                      const insert="\n"+nextNum+". ";
                      const nv=v.substring(0,pos)+insert+v.substring(pos);
                      pendingCursor.current=pos+insert.length;
                      setTaskChat(nv);
                    }else if(numMatch&&curLine.trim()===numMatch[0].trim()){
                      e.preventDefault();
                      const lineStart=pos-curLine.length;
                      const nv=v.substring(0,lineStart>0?lineStart-1:0)+v.substring(pos);

            </button>

function AlertsView({cats, setMainTab, setDetail}){
  const today = new Date();
  const MONTH_ORDER = {"Jan":1,"Feb":2,"Mar":3,"Apr":4,"May":5,"Jun":6,"Jul":7,"Aug":8,"Sep":9,"Oct":10,"Nov":11,"Dec":12};
  
  function daysUntil(deadline){
    if(!deadline) return 999;
    const p = deadline.trim().split(" ");
    const m = MONTH_ORDER[p[0]]||0;
    const d = parseInt(p[1])||0;
    const target = new Date(today.getFullYear(), m-1, d);
    return Math.ceil((target - today)/(1000*60*60*24));
  }

  const allItems = cats.flatMap(c=>c.subs.flatMap(s=>s.items.map(i=>({...i,catId:c.id,catLabel:c.label,catColor:c.color,subLabel:s.label,subId:s.id}))));
  const pending = allItems.filter(i=>!i.done);

  // Build smart alerts
  const alerts = [];

  // OVERDUE — deadline passed
  pending.filter(i=>i.deadline&&daysUntil(i.deadline)<0).forEach(i=>{
    alerts.push({
      level:"high",
      icon:"🚨",
      title:`OVERDUE — ${i.deadline}`,
      msg:i.text,
      sub:`${i.catLabel} · ${i.subLabel}`,
      color:"#d50000",
      bg:"#fff0f0",
      border:"#ff445540",
      item:i
    });
  });

  // DUE TODAY OR TOMORROW
  pending.filter(i=>i.deadline&&daysUntil(i.deadline)>=0&&daysUntil(i.deadline)<=1).forEach(i=>{
    alerts.push({
      level:"high",
      icon:"⏰",
      title:"DUE " + (daysUntil(i.deadline)===0 ? "TODAY" : "TOMORROW — " + i.deadline),
      msg:i.text,
      sub:`${i.catLabel} · ${i.subLabel}`,
      color:"#cc4400",
      bg:"#fff5f0",
      border:"#ff770040",
      item:i
    });
  });

  // DUE IN 2-3 DAYS
  pending.filter(i=>i.deadline&&daysUntil(i.deadline)>=2&&daysUntil(i.deadline)<=3).forEach(i=>{
    alerts.push({
      level:"medium",
      icon:"📅",
      title:`DUE IN ${daysUntil(i.deadline)} DAYS — ${i.deadline}`,
      msg:i.text,
      sub:`${i.catLabel} · ${i.subLabel}`,
      color:"#aa7700",
      bg:"#fffbf0",
      border:"#ffcc4440",
      item:i
    });
  });

  // MISSING FILES — has requiredFiles but not all attached
  pending.filter(i=>i.requiredFiles?.length>0&&!i.requiredFiles.every(r=>(i.files||[]).find(f=>f.label===r))).forEach(i=>{
    const missing = i.requiredFiles.filter(r=>!(i.files||[]).find(f=>f.label===r));
    alerts.push({
      level:"medium",
      icon:"📎",
      title:"FILES NEEDED BEFORE EMAIL CAN SEND",
      msg:missing.map(m=>"- "+m).join("\n"),

      sub:i.catLabel + " — " + i.text,
      color:"#aa7700",
      bg:"#fffbf0",
      border:"#ffcc4440",
      item:i
    });
  });

  // PENDING STATUS — waiting on someone
  pending.filter(i=>i.status==="pending"&&i.isEmail).forEach(i=>{
    alerts.push({
      level:"medium",
      icon:"⏳",
      title:"WAITING FOR REPLY",
      msg:`${i.sender||"Contact"} has not responded yet`,
      sub:`${i.catLabel} — ${i.text}`,
      color:"#4488cc",
      bg:"#f0f6ff",
      border:"#4faaff40",
      item:i,
      hasFollowUp:true
    });
  });

  // HIGH PRIORITY — no deadline but high priority
  pending.filter(i=>i.priority==="high"&&!i.deadline&&i.status==="todo").forEach(i=>{
    alerts.push({
      level:"medium",
      icon:"🔴",
      title:"HIGH PRIORITY — NOT STARTED",
      msg:i.text,
      sub:`${i.catLabel} · ${i.subLabel}`,
      color:"#cc3344",
      bg:"#fff5f5",
      border:"#ff445530",
      item:i
    });
  });

  const high = alerts.filter(a=>a.level==="high");
  const medium = alerts.filter(a=>a.level==="medium");

  function AlertCard({a}){
    return (
      <div style={{background:a.bg,border:`1px solid ${a.border}`,borderRadius:13,padding:"12px 14px",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
          <span style={{fontSize:18,flexShrink:0}}>{a.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:9,fontWeight:800,color:a.color,letterSpacing:"0.08em",marginBottom:3}}>{a.title}</div>
            <div style={{fontSize:12,fontWeight:600,color:"#111122",lineHeight:1.4,whiteSpace:"pre-line"}}>{a.msg}</div>
            <div style={{fontSize:10,color:"#999088",marginTop:3}}>{a.sub}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10}}>
          <button onClick={()=>setDetail({item:a.item,cat:cats.find(c=>c.id===a.item.catId),sub:cats.find(c=>c.id===a.item.catId)?.subs.find(s=>s.id===a.item.subId)})}
            style={{flex:1,padding:"8px",borderRadius:9,border:`1px solid ${a.border}`,background:"#fff",color:a.color,fontSize:11,fontWeight:700,cursor:"pointer"}}>
            Open Task →
          </button>
          {a.hasFollowUp&&(
            <button onClick={()=>{setMainTab("arc");}}
              style={{flex:1,padding:"8px",borderRadius:9,border:"none",background:a.color,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              ✍️ Draft Follow-Up
            </button>
          )}
        </div>
      </div>
    );
  }

  return (
    <div>
      {alerts.length===0&&(
        <div style={{textAlign:"center",padding:"50px 20px"}}>
          <div style={{fontSize:40,marginBottom:12}}>✅</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:"#111122"}}>All clear, Joe!</div>
          <div style={{fontSize:12,color:"#999088",marginTop:6}}>No urgent alerts right now.</div>
        </div>
      )}

      {high.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:9,fontWeight:800,color:"#d50000",letterSpacing:"0.1em",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <span style={{background:"#d50000",color:"#fff",borderRadius:20,padding:"2px 8px"}}>🚨 URGENT — ACT NOW</span>
          </div>
          {high.map((a,i)=><AlertCard key={i} a={a}/>)}
        </div>
      )}

      {medium.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:9,fontWeight:800,color:"#aa7700",letterSpacing:"0.1em",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <span style={{background:"#ffcc44",color:"#553300",borderRadius:20,padding:"2px 8px"}}>📋 NEEDS ATTENTION</span>
          </div>
          {medium.map((a,i)=><AlertCard key={i} a={a}/>)}
        </div>
      )}
    </div>
  );
}
